<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextGen Academy | Dual-Engine AI Smartboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4facfe;
            --secondary: #00f2fe;
            --bg: #030508;
            --panel: rgba(10, 14, 20, 0.95);
            --border: rgba(255, 255, 255, 0.08);
            --mic-ready: #10b981;
            --mic-active: #ef4444;
        }

        body, html { margin: 0; padding: 0; background: var(--bg); color: #fff; font-family: 'Outfit', sans-serif; height: 100vh; overflow: hidden; }
        
        /* 1. ULTRA-THIN EDGE LAYOUT */
        .app-shell { display: flex; width: 100vw; height: 100vh; }

        .sidebar-left { width: 210px; background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .sidebar-right { width: 260px; background: var(--panel); border-left: 1px solid var(--border); display: flex; flex-direction: column; }
        .main-stage { flex: 1; display: flex; flex-direction: column; background: #000; position: relative; }

        /* HEADER */
        .top-nav { height: 60px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; background: rgba(0,0,0,0.4); }
        .brand { font-weight: 800; font-size: 1rem; background: linear-gradient(to right, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* BOARD AREA */
        .iframe-container { flex: 1; position: relative; margin: 10px; border-radius: 15px; overflow: hidden; border: 1px solid var(--border); box-shadow: 0 0 50px rgba(0,0,0,0.5); }
        iframe { width: 100%; height: 100%; border: none; background: #fff; }

        /* API SETTINGS MODAL */
        #api-settings { position: absolute; top: 70px; right: 20px; background: #161b22; padding: 20px; border-radius: 12px; border: 1px solid var(--primary); z-index: 1000; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        input[type="password"] { width: 100%; background: #0d1117; border: 1px solid #30363d; color: white; padding: 8px; border-radius: 5px; margin: 10px 0; font-size: 0.8rem; }
        
        /* MIC BUTTON ENGINE */
        .voice-hub { padding: 20px; display: flex; flex-direction: column; align-items: center; border-top: 1px solid var(--border); }
        .mic-btn { width: 55px; height: 55px; border-radius: 50%; border: none; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; background: var(--mic-ready); box-shadow: 0 0 20px rgba(16, 185, 129, 0.2); }
        .mic-btn.recording { background: var(--mic-active); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }

        /* NAV ELEMENTS */
        .nav-item { width: 100%; padding: 10px 15px; background: transparent; border: none; color: #94a3b8; text-align: left; cursor: pointer; font-size: 0.8rem; border-radius: 5px; transition: 0.2s; }
        .nav-item:hover { background: rgba(255,255,255,0.05); color: #fff; }
        .nav-item.active { background: var(--primary); color: #000; font-weight: bold; }

        /* CHAT BOX */
        .chat-area { flex: 1; overflow-y: auto; padding: 15px; font-size: 0.85rem; scrollbar-width: none; }
        .bubble { margin-bottom: 12px; padding: 10px; border-radius: 10px; line-height: 1.5; }
        .b-nova { background: rgba(79, 172, 254, 0.05); border-left: 2px solid var(--primary); }
        .b-user { background: rgba(255,255,255,0.05); color: var(--text-dim); }
        
        .engine-selector { font-size: 0.65rem; padding: 5px; border-radius: 5px; background: #21262d; color: white; border: none; cursor: pointer; margin-top: 5px; }
    </style>
</head>
<body>

<div class="app-shell">
    <aside class="sidebar-left">
        <div style="padding: 20px; border-bottom: 1px solid var(--border);"><span class="brand">ACADEMY</span></div>
        <div style="flex:1; overflow-y:auto; padding: 10px;" id="sim-list">
            </div>
        <button onclick="toggleSettings()" style="padding:10px; background:none; border:none; color:var(--primary); cursor:pointer; font-size:0.7rem;">⚙️ API SETTINGS</button>
    </aside>

    <main class="main-stage">
        <div id="api-settings">
            <h4 style="margin:0 0 10px 0;">API Gateways</h4>
            <label style="font-size:0.7rem;">GEMINI API KEY</label>
            <input type="password" id="gemini-key" placeholder="Enter Gemini Key...">
            <label style="font-size:0.7rem;">GROQ API KEY</label>
            <input type="password" id="groq-key" placeholder="Enter Groq Key...">
            <button onclick="saveKeys()" style="width:100%; padding:8px; background:var(--primary); border:none; border-radius:5px; font-weight:bold; cursor:pointer;">SAVE CONFIG</button>
        </div>

        <header class="top-nav">
            <div id="active-title" style="font-weight:600; font-size:0.9rem;">Initializing System...</div>
            <select id="engine-choice" class="engine-selector">
                <option value="gemini">Engine: Gemini 1.5</option>
                <option value="groq">Engine: Groq (Llama 3)</option>
            </select>
        </header>

        <div class="iframe-container">
            <iframe id="viewport" src="./html/build-an-atom/latest/build-an-atom_en.html"></iframe>
        </div>
    </main>

    <aside class="sidebar-right">
        <div style="padding: 15px; border-bottom: 1px solid var(--border); font-weight:bold; font-size:0.8rem; letter-spacing:1px;">NOVA AI TUTOR</div>
        <div class="chat-area" id="chat-stream">
            <div class="bubble b-nova">Welcome, Anisul. Configure your API keys to enable the AI brain. Otherwise, I will use basic local routing.</div>
        </div>
        
        <div class="voice-hub">
            <button class="mic-btn" id="mic" onclick="handleVoiceAction()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
            </button>
            <p id="mic-status" style="font-size:0.6rem; margin-top:10px; color:#94a3b8;">TAP GREEN TO START</p>
        </div>
    </aside>
</div>

<script>
    // 1. DYNAMIC DATABASE
    const SIMS = {
        'atom': { title: 'Build an Atom', path: './html/build-an-atom/latest/build-an-atom_en.html', keywords: ['atom', 'proton', 'neutron', 'electron'] },
        'ph': { title: 'pH Scale', path: './html/ph-scale/latest/ph-scale_en.html', keywords: ['ph', 'acid', 'base', 'liquid'] },
        'forces': { title: 'Forces & Motion', path: './html/forces-and-motion-basics/latest/forces-and-motion-basics_en.html', keywords: ['force', 'motion', 'push', 'friction'] },
        'gravity': { title: 'Gravity Lab', path: './html/gravity-force-lab/latest/gravity-force-lab_en.html', keywords: ['gravity', 'mass', 'distance'] },
        'ohms': { title: 'Ohms Law', path: './html/ohms-law/latest/ohms-law_en.html', keywords: ['voltage', 'ohms', 'current', 'electricity'] },
        'molarity': { title: 'Molarity', path: './html/molarity/latest/molarity_en.html', keywords: ['molarity', 'solution', 'solute'] },
        'wave': { title: 'Wave Dynamics', path: './html/wave-on-a-string/latest/wave-on-a-string_en.html', keywords: ['wave', 'oscillation', 'frequency'] }
    };

    // 2. CORE LOGIC
    function initNav() {
        const list = document.getElementById('sim-list');
        for (let key in SIMS) {
            let btn = document.createElement('button');
            btn.className = 'nav-item';
            btn.innerHTML = SIMS[key].title;
            btn.onclick = () => switchSim(key);
            list.appendChild(btn);
        }
        document.getElementById('gemini-key').value = localStorage.getItem('gemini_key') || '';
        document.getElementById('groq-key').value = localStorage.getItem('groq_key') || '';
    }

    function switchSim(key) {
        if(!SIMS[key]) return;
        document.getElementById('viewport').src = SIMS[key].path;
        document.getElementById('active-title').textContent = SIMS[key].title;
        document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
    }

    function toggleSettings() { 
        const s = document.getElementById('api-settings');
        s.style.display = (s.style.display === 'block') ? 'none' : 'block';
    }

    function saveKeys() {
        localStorage.setItem('gemini_key', document.getElementById('gemini-key').value);
        localStorage.setItem('groq_key', document.getElementById('groq-key').value);
        toggleSettings();
        addMsg("System: API Keys Updated.", "nova");
    }

    // 3. VOICE ENGINE
    let isListening = false;
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.continuous = true; 
    recognition.lang = 'en-US';

    function handleVoiceAction() {
        const btn = document.getElementById('mic');
        const status = document.getElementById('mic-status');

        if(!isListening) {
            isListening = true;
            btn.classList.add('recording');
            status.textContent = "LISTENING... TAP RED TO END";
            recognition.start();
        } else {
            isListening = false;
            btn.classList.remove('recording');
            status.textContent = "PROCESSING...";
            recognition.stop();
        }
    }

    recognition.onresult = (event) => {
        const text = event.results[event.results.length - 1][0].transcript;
        processAI(text);
    };

    // 4. DUAL AI ENGINE INTEGRATION
    async function processAI(userInput) {
        addMsg(userInput, "user");
        
        const engine = document.getElementById('engine-choice').value;
        const gemKey = localStorage.getItem('gemini_key');
        const groqKey = localStorage.getItem('groq_key');

        // Automatic Navigation Logic
        for (let key in SIMS) {
            if (SIMS[key].keywords.some(k => userInput.toLowerCase().includes(k))) {
                switchSim(key);
                break;
            }
        }

        let responseText = "I'm ready to help. Please check your API configuration.";

        try {
            if (engine === 'groq' && groqKey) {
                responseText = await callGroq(userInput, groqKey);
            } else if (gemKey) {
                responseText = await callGemini(userInput, gemKey);
            }
        } catch (e) {
            responseText = "Connection error. Ensure your API key is valid and you have an active internet connection.";
        }

        addMsg(responseText, "nova");
        speak(responseText);
    }

    async function callGroq(text, key) {
        const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
            method: "POST",
            headers: { "Authorization": `Bearer ${key}`, "Content-Type": "application/json" },
            body: JSON.stringify({ model: "llama3-8b-8192", messages: [{ role: "system", content: "You are Nova, a science tutor for NextGen Academy." }, { role: "user", content: text }] })
        });
        const data = await res.json();
        return data.choices[0].message.content;
    }

    async function callGemini(text, key) {
        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ contents: [{ parts: [{ text: `You are Nova, an AI tutor. Explain briefly: ${text}` }] }] })
        });
        const data = await res.json();
        return data.candidates[0].content.parts[0].text;
    }

    function addMsg(text, sender) {
        const chat = document.getElementById('chat-stream');
        const div = document.createElement('div');
        div.className = `bubble b-${sender}`;
        div.textContent = text;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }

    function speak(text) {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.rate = 1.1;
        window.speechSynthesis.speak(utterance);
    }

    initNav();
</script>
</body>
</html>
