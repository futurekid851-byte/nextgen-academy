<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NextGen Academy</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: #020617;
      color: white;
    }

    header {
      display: flex;
      justify-content: space-between;
      padding: 20px;
      background: rgba(255,255,255,0.05);
    }

    .logo { color: #38bdf8; font-weight: bold; }

    .container { padding: 20px; }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: rgba(255,255,255,0.1);
      color: white;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px,1fr));
      gap: 15px;
      margin-top: 20px;
    }

    .card {
      padding: 15px;
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
      cursor: pointer;
    }

    .card:hover { background: rgba(56,189,248,0.2); }

    iframe {
      width: 100%;
      height: 500px;
      margin-top: 20px;
      border: none;
    }

    .mic {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #38bdf8;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      display:flex;
      justify-content:center;
      align-items:center;
      cursor:pointer;
    }
  </style>
</head>

<body>

<header>
  <div class="logo">NextGen Academy</div>
  <div>Teacher: Nova</div>
</header>

<div class="container">

  <input type="text" id="search" placeholder="Search simulations...">

  <div class="grid" id="grid"></div>

  <iframe id="viewer"></iframe>

</div>

<div class="mic" onclick="voice()">🎤</div>

<script>

const simulations = [
  { name: "Gravity Force Lab", file: "sims/gravity-force-lab.html" },
  { name: "Energy Forms", file: "sims/energy-forms.html" },
  { name: "Circuit Kit", file: "sims/circuit-kit.html" },
  { name: "Projectile Motion", file: "sims/projectile-motion.html" },
  { name: "States of Matter", file: "sims/states-of-matter.html" },
  { name: "Wave String", file: "sims/wave-string.html" }
];

const grid = document.getElementById("grid");
const viewer = document.getElementById("viewer");

function render(list) {
  grid.innerHTML = "";
  list.forEach(sim => {
    const div = document.createElement("div");
    div.className = "card";
    div.innerText = sim.name;

    div.onclick = () => {
      viewer.src = sim.file;
    };

    grid.appendChild(div);
  });
}

document.getElementById("search").addEventListener("input", e => {
  const value = e.target.value.toLowerCase();
  render(simulations.filter(s => s.name.toLowerCase().includes(value)));
});

render(simulations);

function voice() {
  const r = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  r.start();

  r.onresult = e => {
    const text = e.results[0][0].transcript.toLowerCase();

    const found = simulations.find(s => text.includes(s.name.toLowerCase()));

    if(found) {
      viewer.src = found.file;
    } else {
      alert("Not found");
    }
  }
}

</script>

</body>
</html>
