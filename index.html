<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextGen Academy | Neural Director Elite</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #4facfe;
            --primary-glow: rgba(79, 172, 254, 0.5);
            --secondary: #00f2fe;
            --bg: #010204;
            --panel: rgba(10, 14, 20, 0.99);
            --border: rgba(255, 255, 255, 0.05);
            --mic-ready: #10b981;
            --mic-active: #ef4444;
            --sidebar-w: 180px;
            --tutor-w: 280px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; outline: none; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: #fff; font-family: 'Outfit', sans-serif; height: 100vh; width: 100vw; overflow: hidden; }

        .app-shell { display: flex; width: 100vw; height: 100vh; }

        /* CINEMA-STAGE LAYOUT */
        .sidebar-l { width: var(--sidebar-w); background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 50; }
        .sidebar-r { width: var(--tutor-w); background: var(--panel); border-left: 1px solid var(--border); display: flex; flex-direction: column; z-index: 50; }
        .main-stage { flex: 1; display: flex; flex-direction: column; background: #000; position: relative; }

        .brand { padding: 25px 15px; text-align: center; border-bottom: 1px solid var(--border); }
        .brand h1 { margin: 0; font-size: 0.9rem; font-weight: 900; background: linear-gradient(to right, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 2px; text-transform: uppercase; }

        /* SIMULATION LIST */
        .sim-nav { flex: 1; overflow-y: auto; padding: 10px; scrollbar-width: none; }
        .nav-item { width: 100%; padding: 10px; margin-bottom: 4px; background: transparent; border: none; color: #475569; text-align: left; cursor: pointer; border-radius: 6px; font-size: 0.75rem; transition: var(--transition); }
        .nav-item:hover { color: #fff; background: rgba(255,255,255,0.03); }
        .nav-item.active { color: var(--primary); background: rgba(79, 172, 254, 0.05); border-left: 3px solid var(--primary); font-weight: bold; }

        /* VISUAL BOARD */
        .board-header { height: 50px; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.6); border-bottom: 1px solid var(--border); }
        .board-visual { flex: 1; position: relative; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; background: #fff; transition: opacity 0.5s ease; }

        /* TUTOR INTERFACE */
        .chat-display { flex: 1; overflow-y: auto; padding: 15px; font-size: 0.8rem; scrollbar-width: none; display: flex; flex-direction: column; gap: 15px; }
        .bubble { padding: 12px; border-radius: 12px; line-height: 1.5; animation: slideUp 0.3s ease; max-width: 95%; }
        .b-nova { background: rgba(255, 255, 255, 0.02); border-left: 2px solid var(--primary); color: #e2e8f0; }
        .b-user { background: var(--primary); color: #000; font-weight: 600; align-self: flex-end; text-align: right; box-shadow: 0 5px 15px var(--primary-glow); }

        /* THE "DIRECTOR" AUTO-ACTION TAGS */
        .action-tag { font-size: 0.65rem; color: var(--secondary); font-weight: bold; font-family: 'JetBrains Mono'; margin-top: 5px; display: block; border: 1px solid rgba(0, 242, 254, 0.2); padding: 5px; border-radius: 5px; background: rgba(0,0,0,0.3); }

        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* VOICE HUB */
        .voice-hub { padding: 20px; border-top: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .mic-btn { width: 60px; height: 60px; border-radius: 50%; border: none; cursor: pointer; background: var(--mic-ready); display: flex; align-items: center; justify-content: center; transition: var(--transition); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .mic-btn.active { background: var(--mic-active); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.6); } 70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }

        /* CONFIG MODAL */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.96); z-index: 1000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(15px); }
        .modal-card { width: 400px; background: #0a0c10; padding: 30px; border-radius: 20px; border: 1px solid var(--primary); }
        input { width: 100%; background: #020406; border: 1px solid #1e293b; color: #fff; padding: 12px; border-radius: 10px; margin: 10px 0 20px; font-family: 'JetBrains Mono'; }
        .btn-save { width: 100%; padding: 15px; background: var(--primary); border: none; border-radius: 10px; color: #000; font-weight: 800; cursor: pointer; }
    </style>
</head>
<body>

    <div class="app-shell">
        <aside class="sidebar-l">
            <div class="brand"><h1>ACADEMY</h1></div>
            <nav class="sim-nav" id="simMenu"></nav>
            <div style="padding:15px; text-align:center;"><button onclick="toggleModal(true)" style="background:none; border:none; color:#2d3748; font-size:0.6rem; font-weight:bold; cursor:pointer;">COMMAND CENTER ⚙️</button></div>
        </aside>

        <main class="main-stage">
            <header class="board-header">
                <div id="activeTitle" style="font-weight:700; font-size:0.85rem; letter-spacing:1px; text-transform:uppercase; color:var(--primary);">System Ready</div>
                <div id="engineLabel" style="font-size:0.6rem; color:#475569; font-weight:900;">NEURAL DIRECTOR v14.0 ACTIVE</div>
            </header>
            <div class="board-visual">
                <iframe id="viewport" src="./html/build-an-atom/latest/build-an-atom_en.html"></iframe>
            </div>
        </main>

        <aside class="sidebar-r">
            <div style="padding: 15px; border-bottom: 1px solid var(--border); font-weight: 900; font-size: 0.75rem; color: var(--primary);">NOVA DIRECTOR</div>
            <div class="chat-display" id="chatStream">
                <div class="bubble b-nova">Welcome. I am now in <b>Director Mode</b>. When you ask a question, I will not only explain, but I will "click" and change simulation screens to show you exactly what I am talking about.</div>
            </div>
            <div class="voice-hub">
                <span id="micStatus" style="font-size:0.6rem; font-weight:bold; color:#475569; text-transform:uppercase;">GREEN: READY</span>
                <button class="mic-btn" id="micBtn" onclick="handleInterruptionAction()">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="white">
                        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                    </svg>
                </button>
            </div>
        </aside>
    </div>

    <div class="modal" id="apiModal">
        <div class="modal-card">
            <h2 style="margin:0 0 10px; font-size:1.1rem; color:white;">Neural Infrastructure</h2>
            <input type="password" id="groqIn" placeholder="Groq API Key (Primary)">
            <input type="password" id="gemIn" placeholder="Gemini API Key (Secondary)">
            <button class="btn-save" onclick="saveApi()">ACTIVATE DIRECTOR</button>
        </div>
    </div>

    <script>
        // 1. OMNI-SCIENCE DATABASE (WITH MULTI-SCREEN CAPABILITY)
        const MODULES = {
            'atom': { name: 'Build an Atom', folder: 'build-an-atom', keys: ['atom', 'proton', 'electron'], screens: { base: 1, symbol: 2, game: 3 } },
            'ph': { name: 'pH Scale', folder: 'ph-scale', keys: ['ph', 'acid', 'base', 'liquid'], screens: { macro: 1, micro: 2, custom: 3 } },
            'forces': { name: 'Forces & Motion', folder: 'forces-and-motion-basics', keys: ['force', 'motion', 'friction'], screens: { net: 1, motion: 2, friction: 3, acceleration: 4 } },
            'gravity': { name: 'Gravity Lab', folder: 'gravity-force-lab', keys: ['gravity', 'mass', 'distance'], screens: { base: 1 } },
            'ohms': { name: 'Ohms Law', folder: 'ohms-law', keys: ['voltage', 'ohms', 'current', 'electricity'], screens: { base: 1 } },
            'molarity': { name: 'Molarity', folder: 'molarity', keys: ['molarity', 'solution', 'dissolve'], screens: { base: 1 } },
            'wave': { name: 'Wave Dynamics', folder: 'wave-on-a-string', keys: ['wave', 'oscillation', 'amplitude'], screens: { base: 1 } },
            'energy': { name: 'Energy Skate Park', folder: 'energy-skate-park-basics', keys: ['skate', 'energy', 'kinetic'], screens: { intro: 1, friction: 2, track: 3 } },
            'static': { name: 'John Travoltage', folder: 'john-travoltage', keys: ['static', 'shock', 'spark'], screens: { base: 1 } },
            'pressure': { name: 'Under Pressure', folder: 'under-pressure', keys: ['pressure', 'water'], screens: { base: 1 } }
        };

        let currentActiveSim = 'atom';

        // 2. BOOTSTRAP
        function boot() {
            const menu = document.getElementById('simMenu');
            for (let k in MODULES) {
                let b = document.createElement('button');
                b.className = 'nav-item';
                b.textContent = MODULES[k].name;
                b.id = `btn-${k}`;
                b.onclick = () => launchDirector(k);
                menu.appendChild(b);
            }
            document.getElementById('groqIn').value = localStorage.getItem('nx_v14_groq') || '';
            document.getElementById('gemIn').value = localStorage.getItem('nx_v14_gem') || '';
            launchDirector('atom');
        }

        // LAUNCH & SCREEN CONTROL
        function launchDirector(key, screenNum = 1) {
            if(!MODULES[key]) return;
            currentActiveSim = key;
            const view = document.getElementById('viewport');
            
            // PhET supports screen selection via query parameters
            const url = `./html/${MODULES[key].folder}/latest/${MODULES[key].folder}_en.html?screens=${screenNum}`;
            
            view.src = url;
            document.getElementById('activeTitle').textContent = `${MODULES[key].name} (Screen ${screenNum})`;
            document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${key}`).classList.add('active');
        }

        // 3. THE "DIRECTOR" VOICE INTERRUPT ENGINE
        let listening = false;
        const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRec();
        recognition.continuous = true;
        recognition.lang = 'en-US';

        function handleInterruptionAction() {
            // STOP NOVA IMMEDIATELY ON CLICK
            if (window.speechSynthesis.speaking) {
                window.speechSynthesis.cancel();
            }

            const btn = document.getElementById('micBtn');
            const status = document.getElementById('micStatus');

            if (!listening) {
                listening = true;
                btn.classList.add('active');
                status.textContent = "DIRECTOR LISTENING...";
                recognition.start();
            } else {
                listening = false;
                btn.classList.remove('active');
                status.textContent = "PROCESSING...";
                recognition.stop();
            }
        }

        recognition.onresult = (e) => {
            const text = e.results[e.results.length - 1][0].transcript.toLowerCase();
            neuralDirect(text);
        };

        // 4. THE NEURAL DIRECTOR (REAL-TIME SCRIPTING)
        async function neuralDirect(input) {
            addChat(input, "user");

            // INSTANT ROUTER: Navigates board to the correct topic
            for (let k in MODULES) {
                if (MODULES[k].keys.some(word => input.includes(word))) {
                    launchDirector(k);
                    break;
                }
            }

            const groqK = localStorage.getItem('nx_v14_groq');
            const gemK = localStorage.getItem('nx_v14_gem');
            let response = "API Credentials missing. Open Admin settings.";

            try {
                if (groqK) {
                    response = await fetchGroqDirector(input, groqK);
                } else if (gemK) {
                    response = await fetchGeminiDirector(input, gemK);
                }
            } catch (err) { response = "Network glitch. Re-syncing visual director..."; }

            // ANALYZE RESPONSE FOR SCREEN COMMANDS
            processDirectorTags(response);
            addChat(response, "nova");
            narrate(response);
        }

        // TAG PROCESSOR: Nova can say [GOTO:screen_2] inside the text
        function processDirectorTags(text) {
            const regex = /\[GOTO:screen_(\d+)\]/i;
            const match = text.match(regex);
            if (match) {
                const screenNum = match[1];
                launchDirector(currentActiveSim, screenNum);
            }
        }

        async function fetchGroqDirector(t, k) {
            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${k}`, "Content-Type": "application/json" },
                body: JSON.stringify({ 
                    model: "llama-3.3-70b-versatile", 
                    messages: [
                        { role: "system", content: "You are Nova, an elite scientific director. Explain topics and include the tag [GOTO:screen_X] (X is 1, 2, or 3) when you want to change the visual screen to match your point. For Atom: 1=Base, 2=Symbol, 3=Game. For Forces: 1=Net Force, 2=Motion, 3=Friction." }, 
                        { role: "user", content: t }
                    ] 
                })
            });
            const data = await res.json();
            return data.choices[0].message.content;
        }

        async function fetchGeminiDirector(t, k) {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${k}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: `Explain briefly and include [GOTO:screen_2] tags to switch visuals: ${t}` }] }] })
            });
            const data = await res.json();
            return data.candidates[0].content.parts[0].text;
        }

        // 5. UTILS
        function addChat(t, c) {
            const display = document.getElementById('chatStream');
            const div = document.createElement('div');
            div.className = `bubble b-${c}`;
            
            // Clean tags from the chat view for a premium look
            const cleanText = t.replace(/\[GOTO:screen_\d+\]/gi, '<span class="action-tag">Visual Switched to Active Screen</span>');
            div.innerHTML = cleanText;
            
            display.appendChild(div);
            display.scrollTop = display.scrollHeight;
        }

        function narrate(t) {
            // Remove tags from the voice synthesis
            const cleanText = t.replace(/\[GOTO:screen_\d+\]/gi, '');
            const utterance = new SpeechSynthesisUtterance(cleanText);
            utterance.rate = 1.05;
            window.speechSynthesis.speak(utterance);
        }

        function toggleModal(s) { document.getElementById('apiModal').style.display = s ? 'flex' : 'none'; }
        
        function saveApi() {
            localStorage.setItem('nx_v14_groq', document.getElementById('groqIn').value.trim());
            localStorage.setItem('nx_v14_gem', document.getElementById('gemIn').value.trim());
            toggleModal(false);
            addChat("Director Systems Active. I can now control simulation screens based on our conversation.", "nova");
        }

        window.onload = boot;
    </script>
</body>
</html>
