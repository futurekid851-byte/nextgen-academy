<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextGen Academy | Elite Navigator</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
        /* ================================================================
        1.0 GLOBAL DESIGN ARCHITECTURE
        ================================================================
        */
        :root {
            --primary: #4facfe;
            --primary-glow: rgba(79, 172, 254, 0.4);
            --secondary: #00f2fe;
            --bg-obsidian: #020308;
            --panel-glass: rgba(10, 15, 25, 0.98);
            --border-glow: rgba(255, 255, 255, 0.05);
            --text-high: #f8fafc;
            --text-low: #64748b;
            --mic-ready: #10b981; /* Premium Green */
            --mic-active: #ef4444; /* Alert Red */
            --sidebar-w: 190px;
            --tutor-w: 260px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; outline: none; -webkit-font-smoothing: antialiased; }
        
        body, html {
            margin: 0; padding: 0;
            background: var(--bg-obsidian);
            color: var(--text-high);
            font-family: 'Outfit', sans-serif;
            height: 100vh; width: 100vw;
            overflow: hidden;
        }

        /* CUSTOM SCROLLBARS */
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-glow); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        /* ================================================================
        2.0 MAIN INTERFACE LAYOUT
        ================================================================
        */
        .app-shell {
            display: flex;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at 50% 50%, #0d1221 0%, #020308 100%);
        }

        /* STEALTH LEFT SIDEBAR */
        .sidebar-nav {
            width: var(--sidebar-w);
            background: var(--panel-glass);
            backdrop-filter: blur(25px);
            border-right: 1px solid var(--border-glow);
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        /* CINEMA STAGE (CENTRAL BOARD) */
        .cinema-stage {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #000;
            position: relative;
            box-shadow: 0 0 100px rgba(0,0,0,1);
        }

        /* INTELLIGENT RIGHT PANEL */
        .tutor-panel {
            width: var(--tutor-w);
            background: var(--panel-glass);
            backdrop-filter: blur(25px);
            border-left: 1px solid var(--border-glow);
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        /* ================================================================
        3.0 UI COMPONENTS
        ================================================================
        */

        /* TOP NAVIGATION BAR */
        .top-bar {
            height: 55px;
            background: rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            border-bottom: 1px solid var(--border-glow);
        }

        .module-indicator {
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            color: var(--primary);
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .engine-badge {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6rem;
            padding: 4px 10px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border-glow);
            border-radius: 4px;
            color: var(--text-low);
        }

        /* SIMULATION IFRAME CONTAINER */
        .visual-viewport {
            flex: 1;
            position: relative;
            background: #000;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #fff;
            transition: opacity 0.5s ease;
        }

        /* NAVIGATION BUTTONS */
        .sim-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px 5px;
        }

        .nav-label {
            font-size: 0.6rem;
            font-weight: 800;
            color: #444;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 20px 0 10px 15px;
        }

        .nav-btn {
            width: 90%;
            margin: 0 auto 4px;
            padding: 10px 15px;
            background: transparent;
            border: none;
            color: var(--text-low);
            text-align: left;
            cursor: pointer;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: var(--transition);
        }

        .nav-btn:hover {
            background: rgba(255,255,255,0.03);
            color: #fff;
        }

        .nav-btn.active {
            background: rgba(79, 172, 254, 0.08);
            color: var(--primary);
            font-weight: 700;
            border-left: 2px solid var(--primary);
        }

        /* ================================================================
        4.0 AI CHAT & VOICE INTERFACE
        ================================================================
        */
        .chat-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scrollbar-width: none;
        }

        .bubble {
            max-width: 90%;
            padding: 12px 15px;
            border-radius: 12px;
            font-size: 0.8rem;
            line-height: 1.5;
            animation: popIn 0.3s ease-out forwards;
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .nova-msg {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border-glow);
            color: #e2e8f0;
            align-self: flex-start;
        }

        .user-msg {
            background: var(--primary);
            color: #000;
            font-weight: 600;
            align-self: flex-end;
            box-shadow: 0 5px 15px var(--primary-glow);
        }

        /* THE MIC TOGGLE BUTTON */
        .voice-hub {
            padding: 25px;
            border-top: 1px solid var(--border-glow);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .mic-trigger {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            background: var(--mic-ready);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .mic-trigger.active {
            background: var(--mic-active);
            animation: pulse-ring 1.5s infinite;
        }

        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        .mic-status {
            font-size: 0.6rem;
            font-weight: 800;
            color: var(--text-low);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* ================================================================
        5.0 SETTINGS & API MODAL
        ================================================================
        */
        .config-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(15px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .config-card {
            width: 420px;
            background: #0f172a;
            border: 1px solid var(--primary);
            border-radius: 20px;
            padding: 35px;
            box-shadow: 0 25px 50px rgba(0,0,0,1);
        }

        .config-card h2 { margin: 0 0 25px; font-size: 1.2rem; text-align: center; }

        .api-input-wrap { margin-bottom: 20px; }
        .api-input-wrap label { font-size: 0.65rem; color: var(--primary); font-weight: bold; display: block; margin-bottom: 8px; }
        .api-input-wrap input {
            width: 100%; background: #020617; border: 1px solid #1e293b;
            color: white; padding: 12px; border-radius: 10px; font-family: 'JetBrains Mono', monospace; font-size: 0.8rem;
        }

        .btn-save {
            width: 100%; padding: 15px; background: var(--primary);
            border: none; border-radius: 12px; color: black; font-weight: 900;
            cursor: pointer; transition: 0.2s;
        }

        .btn-save:hover { filter: brightness(1.2); transform: scale(1.02); }

    </style>
</head>
<body>

    <div class="app-shell">
        
        <aside class="sidebar-nav">
            <div style="padding: 20px; border-bottom: 1px solid var(--border-glow); text-align: center;">
                <h1 style="margin:0; font-size: 1rem; color: var(--primary); font-weight: 900; letter-spacing: 1px;">NEXTGEN</h1>
            </div>

            <nav class="sim-list" id="sidebarList">
                </nav>

            <div style="padding: 15px; border-top: 1px solid var(--border-glow); text-align: center;">
                <button onclick="toggleConfig(true)" style="background:none; border:none; color:#334155; font-size:0.6rem; font-weight:bold; cursor:pointer; letter-spacing:1px;">API COMMAND CENTER ⚙️</button>
            </div>
        </aside>

        <main class="cinema-stage">
            <header class="top-bar">
                <div class="module-indicator">
                    <div style="width:10px; height:10px; background:var(--primary); border-radius:50%;"></div>
                    <span id="headerTitle">Initializing Board...</span>
                </div>
                <div class="engine-badge" id="engineStatus">MODE: STANDBY</div>
            </header>

            <section class="visual-viewport">
                <iframe id="simulationFrame" src="./html/build-an-atom/latest/build-an-atom_en.html"></iframe>
            </section>
        </main>

        <aside class="tutor-panel">
            <div style="padding: 15px; border-bottom: 1px solid var(--border-glow); font-weight: 900; font-size: 0.75rem; letter-spacing: 1px; color: var(--primary);">NOVA INTELLIGENCE</div>
            
            <div class="chat-scroll" id="chatWindow">
                <div class="bubble nova-msg">System Active. Click the <b>Green Mic</b> to speak. I will automatically navigate the board for you based on your questions.</div>
            </div>

            <div class="voice-hub">
                <span class="mic-status" id="micHint">Ready for Input</span>
                <button class="mic-trigger" id="micBtn" onclick="toggleVoiceSession()">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="white">
                        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                        <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                    </svg>
                </button>
            </div>
        </aside>

    </div>

    <div class="config-overlay" id="configModal">
        <div class="config-card">
            <h2>AI Infrastructure</h2>
            <div class="api-input-wrap">
                <label>Primary Engine: Groq Key</label>
                <input type="password" id="groqKey" placeholder="Paste Groq API Key...">
            </div>
            <div class="api-input-wrap">
                <label>Secondary Engine: Gemini Key</label>
                <input type="password" id="geminiKey" placeholder="Paste Gemini API Key...">
            </div>
            <button class="btn-save" onclick="saveKeys()">ACTIVATE SYSTEMS</button>
            <p style="color:#475569; font-size:0.6rem; text-align:center; margin-top:15px; cursor:pointer;" onclick="toggleConfig(false)">CLOSE SETTINGS</p>
        </div>
    </div>

    <script>
        // ----------------------------------------------------
        // A. SYSTEM DATA & ROUTING MAP
        // ----------------------------------------------------
        const ACADEMY_CORE = {
            'Chemistry': [
                { id: 'atom', name: 'Build an Atom', folder: 'build-an-atom', keywords: ['atom', 'proton', 'neutron', 'electron', 'subatomic'] },
                { id: 'ph', name: 'pH Scale', folder: 'ph-scale', keywords: ['ph', 'acid', 'base', 'liquid', 'alkaline', 'lemon'] },
                { id: 'molarity', name: 'Molarity Lab', folder: 'molarity', keywords: ['molarity', 'solution', 'solute', 'dissolve'] },
                { id: 'beers', name: 'Beers Law', folder: 'beers-law-lab', keywords: ['beers', 'light', 'absorbance', 'concentration'] }
            ],
            'Physics': [
                { id: 'forces', name: 'Forces & Motion', folder: 'forces-and-motion-basics', keywords: ['force', 'motion', 'friction', 'push', 'pull', 'speed'] },
                { id: 'gravity', name: 'Gravity Lab', folder: 'gravity-force-lab', keywords: ['gravity', 'mass', 'attract', 'distance', 'newton'] },
                { id: 'waves', name: 'Wave Dynamics', folder: 'wave-on-a-string', keywords: ['wave', 'oscillation', 'vibration', 'amplitude', 'string'] },
                { id: 'ohms', name: 'Ohms Law', folder: 'ohms-law', keywords: ['voltage', 'ohms', 'current', 'electricity', 'wire'] }
            ]
        };

        // ----------------------------------------------------
        // B. UI INITIALIZATION
        // ----------------------------------------------------
        function initializeSystem() {
            const listContainer = document.getElementById('sidebarList');
            for (let category in ACADEMY_CORE) {
                let catLabel = document.createElement('div');
                catLabel.className = 'nav-label';
                catLabel.textContent = category;
                listContainer.appendChild(catLabel);

                ACADEMY_CORE[category].forEach(sim => {
                    let btn = document.createElement('button');
                    btn.className = 'nav-btn';
                    btn.id = `btn-${sim.id}`;
                    btn.innerHTML = sim.name;
                    btn.onclick = () => navigateBoard(sim);
                    listContainer.appendChild(btn);
                });
            }
            
            // Load keys from storage
            document.getElementById('groqKey').value = localStorage.getItem('nx_groq') || '';
            document.getElementById('geminiKey').value = localStorage.getItem('nx_gemini') || '';
            
            // Set Default
            navigateBoard(ACADEMY_CORE.Chemistry[0]);
        }

        function navigateBoard(sim) {
            const frame = document.getElementById('simulationFrame');
            const title = document.getElementById('headerTitle');
            const url = `./html/${sim.folder}/latest/${sim.folder}_en.html`;

            frame.style.opacity = '0.3';
            setTimeout(() => {
                frame.src = url;
                title.textContent = sim.name;
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                document.getElementById(`btn-${sim.id}`).classList.add('active');
                frame.style.opacity = '1';
            }, 300);
        }

        // ----------------------------------------------------
        // C. VOICE & AI ENGINE (THE BRAIN)
        // ----------------------------------------------------
        let listening = false;
        const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRec();
        recognition.continuous = true;
        recognition.lang = 'en-US';

        function toggleVoiceSession() {
            const btn = document.getElementById('micBtn');
            const hint = document.getElementById('micHint');

            if (!listening) {
                listening = true;
                btn.classList.add('active');
                hint.textContent = "LISTENING... CLICK TO STOP";
                recognition.start();
            } else {
                listening = false;
                btn.classList.remove('active');
                hint.textContent = "PROCESSING...";
                recognition.stop();
            }
        }

        recognition.onresult = (e) => {
            const transcript = e.results[e.results.length - 1][0].transcript;
            handleAIResponse(transcript);
        };

        async function handleAIResponse(userInput) {
            addMessage(userInput, 'user');

            // 1. PREMIUM AUTOMATED NAVIGATION
            // We scan the user's voice for simulation keywords BEFORE the AI even speaks.
            let foundMatch = false;
            for (let cat in ACADEMY_CORE) {
                ACADEMY_CORE[cat].forEach(sim => {
                    if (sim.keywords.some(k => userInput.toLowerCase().includes(k))) {
                        navigateBoard(sim);
                        foundMatch = true;
                    }
                });
            }

            // 2. AI EXPLANATION ENGINE
            const groqKey = localStorage.getItem('nx_groq');
            const gemKey = localStorage.getItem('nx_gemini');
            let responseText = "Engines Disconnected. Please add your API keys in the Command Center.";

            try {
                if (groqKey) {
                    document.getElementById('engineStatus').textContent = "PRIMARY: GROQ 3.1";
                    responseText = await callGroq(userInput, groqKey);
                } else if (gemKey) {
                    document.getElementById('engineStatus').textContent = "BACKUP: GEMINI 1.5";
                    responseText = await callGemini(userInput, gemKey);
                }
            } catch (err) {
                responseText = "Satellite Link Failed. Check your connection or API status.";
            }

            addMessage(responseText, 'nova');
            speakNova(responseText);
        }

        // API CALLS
        async function callGroq(text, key) {
            const r = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${key}`, "Content-Type": "application/json" },
                body: JSON.stringify({ 
                    model: "llama-3.1-8b-instant", 
                    messages: [{ role: "system", content: "You are Nova, a concise science tutor for NextGen Academy." }, { role: "user", content: text }] 
                })
            });
            const d = await r.json();
            return d.choices[0].message.content;
        }

        async function callGemini(text, key) {
            const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: `Explain briefly as a science tutor: ${text}` }] }] })
            });
            const d = await r.json();
            return d.candidates[0].content.parts[0].text;
        }

        // ----------------------------------------------------
        // D. UTILITY FUNCTIONS
        // ----------------------------------------------------
        function addMessage(text, sender) {
            const chat = document.getElementById('chatWindow');
            const div = document.createElement('div');
            div.className = `bubble ${sender}-msg`;
            div.textContent = text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function speakNova(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 1.1;
            utterance.pitch = 1.1;
            window.speechSynthesis.speak(utterance);
        }

        function toggleConfig(show) {
            document.getElementById('configModal').style.display = show ? 'flex' : 'none';
        }

        function saveKeys() {
            localStorage.setItem('nx_groq', document.getElementById('groqKey').value.trim());
            localStorage.setItem('nx_gemini', document.getElementById('geminiKey').value.trim());
            toggleConfig(false);
            addMessage("Infrastructure Connected. System ready for lecture.", "nova");
        }

        // BOOT THE SYSTEM
        window.onload = initializeSystem;

    </script>
</body>
</html>
