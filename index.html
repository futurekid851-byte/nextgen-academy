<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextGen Academy | Real-Time Intercept</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
        /* ================================================================
        1.0 CORE UI ARCHITECTURE
        ================================================================
        */
        :root {
            --primary: #4facfe;
            --primary-glow: rgba(79, 172, 254, 0.4);
            --secondary: #00f2fe;
            --bg-obsidian: #010206;
            --panel: rgba(10, 15, 25, 0.98);
            --border: rgba(255, 255, 255, 0.05);
            --mic-ready: #10b981;
            --mic-active: #ef4444;
            --sidebar-w: 180px;
            --tutor-w: 260px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; outline: none; }
        
        body, html {
            margin: 0; padding: 0;
            background: var(--bg-obsidian);
            color: #fff;
            font-family: 'Outfit', sans-serif;
            height: 100vh; width: 100vw;
            overflow: hidden;
        }

        /* 2.0 CINEMA LAYOUT */
        .app-shell {
            display: flex;
            width: 100vw;
            height: 100vh;
        }

        .sidebar-left {
            width: var(--sidebar-w);
            background: var(--panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 50;
        }

        .main-stage {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #000;
            position: relative;
        }

        .sidebar-right {
            width: var(--tutor-w);
            background: var(--panel);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 50;
        }

        /* 3.0 NAVIGATION & BRANDING */
        .brand {
            padding: 25px 15px;
            text-align: center;
            border-bottom: 1px solid var(--border);
        }

        .brand h1 {
            margin: 0; font-size: 1rem; font-weight: 900;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }

        .nav-list { flex: 1; overflow-y: auto; padding: 15px 5px; }
        .nav-item {
            width: 95%; margin: 0 auto 5px; padding: 10px 12px;
            background: transparent; border: none; color: #64748b;
            text-align: left; cursor: pointer; border-radius: 6px;
            font-size: 0.75rem; transition: var(--transition);
        }
        .nav-item:hover { background: rgba(255,255,255,0.03); color: #fff; }
        .nav-item.active { background: rgba(79, 172, 254, 0.08); color: var(--primary); border-left: 2px solid var(--primary); font-weight: bold; }

        /* 4.0 VISUAL STAGE */
        .stage-header {
            height: 50px; padding: 0 20px;
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(0,0,0,0.4); border-bottom: 1px solid var(--border);
        }

        .board-container { flex: 1; position: relative; }
        iframe { width: 100%; height: 100%; border: none; background: #fff; }

        /* 5.0 CHAT & INTERRUPT SYSTEM */
        .chat-area { flex: 1; overflow-y: auto; padding: 20px; font-size: 0.8rem; scrollbar-width: none; }
        .bubble { margin-bottom: 15px; padding: 12px; border-radius: 12px; line-height: 1.5; animation: slideUp 0.3s ease; }
        .b-nova { background: rgba(255,255,255,0.02); border-left: 2px solid var(--primary); }
        .b-user { background: var(--primary); color: #000; font-weight: 600; align-self: flex-end; text-align: right; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* VOICE HUB */
        .voice-hub { padding: 25px; border-top: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .mic-btn {
            width: 65px; height: 65px; border-radius: 50%; border: none; cursor: pointer;
            background: var(--mic-ready); display: flex; align-items: center; justify-content: center;
            transition: var(--transition); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .mic-btn.active { background: var(--mic-active); animation: pulse 1.5s infinite; }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        /* 6.0 CONFIG MODAL */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .modal-card { width: 400px; background: #0f172a; padding: 30px; border-radius: 20px; border: 1px solid var(--primary); }
        input { width: 100%; background: #020617; border: 1px solid #1e293b; color: white; padding: 12px; border-radius: 10px; margin: 10px 0 20px; font-family: 'JetBrains Mono'; }
        .btn-save { width: 100%; padding: 15px; background: var(--primary); border: none; border-radius: 10px; color: black; font-weight: 900; cursor: pointer; }
    </style>
</head>
<body>

    <div class="app-shell">
        <aside class="sidebar-left">
            <div class="brand"><h1>ACADEMY</h1></div>
            <nav class="nav-list" id="simMenu"></nav>
            <div style="padding:15px; text-align:center;"><button onclick="toggleModal(true)" style="background:none; border:none; color:#334155; font-size:0.6rem; font-weight:bold; cursor:pointer;">API CONFIG ⚙️</button></div>
        </aside>

        <main class="main-stage">
            <header class="stage-header">
                <div id="activeTitle" style="font-weight:700; font-size:0.8rem; letter-spacing:1px; text-transform:uppercase;">Initializing...</div>
                <div style="font-size:0.6rem; color:var(--primary); font-weight:900;">REAL-TIME SYNC: ACTIVE</div>
            </header>
            <div class="board-container">
                <iframe id="mainBoard" src="./html/build-an-atom/latest/build-an-atom_en.html"></iframe>
            </div>
        </main>

        <aside class="sidebar-right">
            <div style="padding: 15px; border-bottom: 1px solid var(--border); font-weight: 900; font-size: 0.75rem; color: var(--primary);">NOVA TUTOR</div>
            <div class="chat-area" id="chatDisplay">
                <div class="bubble b-nova">Welcome. I am now in <b>Interruption Mode</b>. If I am talking and you have a question, simply click the mic. I will stop immediately to listen to you.</div>
            </div>
            <div class="voice-hub">
                <span id="micStatus" style="font-size:0.6rem; font-weight:bold; color:#475569; text-transform:uppercase;">Tap to Start</span>
                <button class="mic-btn" id="micTrigger" onclick="handleVoiceSession()">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="white">
                        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                    </svg>
                </button>
            </div>
        </aside>
    </div>

    <div class="modal" id="apiModal">
        <div class="modal-card">
            <h2 style="margin:0;">Infrastructure</h2>
            <p style="font-size:0.7rem; color:var(--primary);">PRIMARY ENGINE: GROQ (LLAMA 3.1)</p>
            <input type="password" id="groqInput" placeholder="Paste Groq API Key...">
            <p style="font-size:0.7rem; color:var(--primary);">SECONDARY: GEMINI 1.5</p>
            <input type="password" id="geminiInput" placeholder="Paste Gemini API Key...">
            <button class="btn-save" onclick="saveKeys()">ACTIVATE ENGINES</button>
        </div>
    </div>

    <script>
        // 1. DATA RECTIFICATION & ROUTING
        const DB = {
            'atom': { name: 'Build an Atom', folder: 'build-an-atom', keywords: ['atom', 'proton', 'neutron', 'electron'] },
            'ph': { name: 'pH Scale', folder: 'ph-scale', keywords: ['ph', 'acid', 'base', 'alkaline', 'liquid'] },
            'forces': { name: 'Forces & Motion', folder: 'forces-and-motion-basics', keywords: ['force', 'motion', 'friction', 'push'] },
            'gravity': { name: 'Gravity Lab', folder: 'gravity-force-lab', keywords: ['gravity', 'mass', 'distance'] },
            'ohms': { name: 'Ohms Law', folder: 'ohms-law', keywords: ['voltage', 'ohms', 'current', 'electricity'] },
            'molarity': { name: 'Molarity', folder: 'molarity', keywords: ['molarity', 'solution', 'solute'] },
            'wave': { name: 'Wave Dynamics', folder: 'wave-on-a-string', keywords: ['wave', 'oscillation', 'vibration'] }
        };

        // 2. BOOTSTRAP
        function boot() {
            const menu = document.getElementById('simMenu');
            for (let k in DB) {
                let btn = document.createElement('button');
                btn.className = 'nav-item';
                btn.textContent = DB[k].name;
                btn.id = `btn-${k}`;
                btn.onclick = () => runSim(k);
                menu.appendChild(btn);
            }
            document.getElementById('groqInput').value = localStorage.getItem('nx_groq_v10') || '';
            document.getElementById('geminiInput').value = localStorage.getItem('nx_gem_v10') || '';
            runSim('atom');
        }

        function runSim(key) {
            const frame = document.getElementById('mainBoard');
            frame.src = `./html/${DB[key].folder}/latest/${DB[key].folder}_en.html`;
            document.getElementById('activeTitle').textContent = DB[key].name;
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${key}`).classList.add('active');
        }

        // 3. THE INTERRUPTION ENGINE (KEY FEATURE)
        let isListening = false;
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.continuous = true;
        recognition.lang = 'en-US';

        function handleVoiceSession() {
            // CRITICAL: Interruption Logic
            // If Nova is currently speaking, stop her immediately!
            if (window.speechSynthesis.speaking) {
                window.speechSynthesis.cancel();
                addChat("<i>(Interrupted Nova to listen...)</i>", "nova");
            }

            const btn = document.getElementById('micTrigger');
            const hint = document.getElementById('micStatus');

            if (!isListening) {
                isListening = true;
                btn.classList.add('active');
                hint.textContent = "LISTENING...";
                recognition.start();
            } else {
                isListening = false;
                btn.classList.remove('active');
                hint.textContent = "THINKING...";
                recognition.stop();
            }
        }

        recognition.onresult = (e) => {
            const text = e.results[e.results.length - 1][0].transcript;
            processAI(text);
        };

        // 4. AI & AUTO-PILOT NAVIGATION
        async function processAI(input) {
            addChat(input, "user");

            // Direct Visual Control (Auto-Navigate based on keywords)
            for (let k in DB) {
                if (DB[k].keywords.some(word => input.toLowerCase().includes(word))) {
                    runSim(k);
                    break;
                }
            }

            const groqKey = localStorage.getItem('nx_groq_v10');
            const gemKey = localStorage.getItem('nx_gem_v10');
            let response = "API Keys required. Open Admin settings.";

            try {
                if (groqKey) {
                    response = await fetchGroq(input, groqKey);
                } else if (gemKey) {
                    response = await fetchGemini(input, gemKey);
                }
            } catch (err) { response = "Connection lost. Please retry."; }

            addChat(response, "nova");
            narrate(response);
        }

        async function fetchGroq(text, key) {
            const r = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${key}`, "Content-Type": "application/json" },
                body: JSON.stringify({ model: "llama-3.1-8b-instant", messages: [{ role: "system", content: "You are Nova, an AI tutor. Give short, punchy, scientific replies." }, { role: "user", content: text }] })
            });
            const d = await r.json();
            return d.choices[0].message.content;
        }

        async function fetchGemini(text, key) {
            const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: `Brief science tutor explanation: ${text}` }] }] })
            });
            const d = await r.json();
            return d.candidates[0].content.parts[0].text;
        }

        // 5. UI UTILS
        function addChat(t, c) {
            const chat = document.getElementById('chatDisplay');
            const div = document.createElement('div');
            div.className = `bubble b-${c}`;
            div.innerHTML = t;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function narrate(t) {
            const u = new SpeechSynthesisUtterance(t);
            u.rate = 1.1;
            window.speechSynthesis.speak(u);
        }

        function toggleModal(s) { document.getElementById('apiModal').style.display = s ? 'flex' : 'none'; }
        
        function saveKeys() {
            localStorage.setItem('nx_groq_v10', document.getElementById('groqInput').value.trim());
            localStorage.setItem('nx_gem_v10', document.getElementById('geminiInput').value.trim());
            toggleModal(false);
            addChat("Engines Online. You can now interrupt me at any time.", "nova");
        }

        window.onload = boot;
    </script>
</body>
</html>
