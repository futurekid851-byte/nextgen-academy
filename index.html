<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextGen Academy | Omni-Science Master</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&family=JetBrains+Mono&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #4facfe;
            --primary-glow: rgba(79, 172, 254, 0.5);
            --secondary: #00f2fe;
            --bg: #010205;
            --panel: rgba(10, 14, 22, 0.99);
            --border: rgba(255, 255, 255, 0.04);
            --mic-ready: #10b981;
            --mic-active: #ef4444;
            --sidebar-w: 180px;
            --tutor-w: 260px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; outline: none; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: #fff; font-family: 'Outfit', sans-serif; height: 100vh; width: 100vw; overflow: hidden; }

        /* THE CINEMA LAYOUT */
        .app-shell { display: flex; width: 100vw; height: 100vh; }

        /* EDGE SIDEBARS */
        .sidebar-l { width: var(--sidebar-w); background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 50; }
        .sidebar-r { width: var(--tutor-w); background: var(--panel); border-left: 1px solid var(--border); display: flex; flex-direction: column; z-index: 50; }
        .main-stage { flex: 1; display: flex; flex-direction: column; background: #000; position: relative; }

        /* BRANDING & LISTS */
        .brand { padding: 25px 10px; text-align: center; border-bottom: 1px solid var(--border); }
        .brand h1 { margin: 0; font-size: 1rem; font-weight: 900; background: linear-gradient(to right, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 2px; text-transform: uppercase; }

        .sim-nav { flex: 1; overflow-y: auto; padding: 15px 10px; scrollbar-width: none; }
        .nav-item { width: 100%; padding: 12px; margin-bottom: 4px; background: transparent; border: none; color: #475569; text-align: left; cursor: pointer; border-radius: 8px; font-size: 0.75rem; transition: var(--transition); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .nav-item:hover { color: #fff; background: rgba(255,255,255,0.03); transform: translateX(3px); }
        .nav-item.active { color: var(--primary); background: rgba(79, 172, 254, 0.05); border-left: 3px solid var(--primary); font-weight: bold; }

        /* THE VISUAL BOARD */
        .board-header { height: 55px; padding: 0 25px; display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.4); border-bottom: 1px solid var(--border); }
        .visual-container { flex: 1; position: relative; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; background: #fff; transition: opacity 0.5s ease; }

        /* TUTOR & VOICE UI */
        .chat-container { flex: 1; overflow-y: auto; padding: 20px; font-size: 0.8rem; scrollbar-width: none; display: flex; flex-direction: column; gap: 15px; }
        .bubble { padding: 12px 16px; border-radius: 12px; line-height: 1.6; animation: slideIn 0.3s ease; max-width: 90%; }
        .b-nova { background: rgba(255, 255, 255, 0.02); border-left: 2px solid var(--primary); color: #e2e8f0; }
        .b-user { background: var(--primary); color: #000; font-weight: 600; align-self: flex-end; text-align: right; box-shadow: 0 5px 15px var(--primary-glow); }

        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* INTERRUPT MIC BUTTON */
        .voice-zone { padding: 25px; border-top: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .mic-btn { width: 65px; height: 65px; border-radius: 50%; border: none; cursor: pointer; background: var(--mic-ready); display: flex; align-items: center; justify-content: center; transition: var(--transition); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .mic-btn.active { background: var(--mic-active); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.6); } 70% { box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }

        /* SETTINGS MODAL */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(15px); }
        .modal-card { width: 400px; background: #0f172a; padding: 30px; border-radius: 20px; border: 1px solid var(--primary); box-shadow: 0 20px 60px rgba(0,0,0,1); }
        input { width: 100%; background: #020617; border: 1px solid #1e293b; color: #fff; padding: 12px; border-radius: 10px; margin: 10px 0 20px; font-family: 'JetBrains Mono'; font-size: 0.8rem; }
        .btn-save { width: 100%; padding: 15px; background: var(--primary); border: none; border-radius: 12px; color: #000; font-weight: 900; cursor: pointer; }
    </style>
</head>
<body>

    <div class="app-shell">
        <aside class="sidebar-l">
            <div class="brand"><h1>NEXTGEN</h1></div>
            <nav class="sim-nav" id="simList"></nav>
            <div style="padding:15px; text-align:center;"><button onclick="toggleModal(true)" style="background:none; border:none; color:#334155; font-size:0.6rem; font-weight:bold; cursor:pointer;">API CONFIG ⚙️</button></div>
        </aside>

        <main class="main-stage">
            <header class="board-header">
                <div id="activeSimTitle" style="font-weight:700; font-size:0.9rem; letter-spacing:1px; text-transform:uppercase; color:var(--primary);">System Ready</div>
                <div id="engineLabel" style="font-size:0.6rem; color:#475569; font-weight:900;">DUAL-ENGINE REALTIME SYNC v12.0</div>
            </header>
            <div class="visual-container">
                <iframe id="viewport" src="./html/build-an-atom/latest/build-an-atom_en.html"></iframe>
            </div>
        </main>

        <aside class="sidebar-r">
            <div style="padding: 15px; border-bottom: 1px solid var(--border); font-weight: 900; font-size: 0.75rem; color: var(--primary); letter-spacing:1px;">NOVA INTELLIGENCE</div>
            <div class="chat-container" id="chatStream">
                <div class="bubble b-nova">Welcome Anisul. All 23 modules are loaded. I am ready to explain any topic with <b>real-time visuals</b>. Simply click the <b>Green Mic</b> to speak.</div>
            </div>
            <div class="voice-zone">
                <span id="micHint" style="font-size:0.6rem; font-weight:bold; color:#475569; text-transform:uppercase;">Green: Start Lecture</span>
                <button class="mic-btn" id="micBtn" onclick="handleInterruptionSession()">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="white">
                        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                    </svg>
                </button>
            </div>
        </aside>
    </div>

    <div class="modal" id="apiModal">
        <div class="modal-card">
            <h2 style="margin:0 0 10px; font-size:1.2rem; color:white;">System Gateways</h2>
            <label style="font-size:0.65rem; color:var(--primary); font-weight:bold;">GROQ API KEY (PRIMARY)</label>
            <input type="password" id="groqKey" placeholder="Paste Groq Key...">
            <label style="font-size:0.65rem; color:var(--primary); font-weight:bold;">GEMINI API KEY (SECONDARY)</label>
            <input type="password" id="geminiKey" placeholder="Paste Gemini Key...">
            <button class="btn-save" onclick="saveKeys()">ACTIVATE ACADEMY</button>
            <p onclick="toggleModal(false)" style="color:#475569; font-size:0.6rem; text-align:center; margin-top:15px; cursor:pointer;">CLOSE SETTINGS</p>
        </div>
    </div>

    <script>
        // 1. ALL 23 SCIENCE SIMULATIONS MAPPED WITH NEURAL KEYWORDS
        const SIM_DATABASE = {
            'atom': { name: 'Build an Atom', folder: 'build-an-atom', keywords: ['atom', 'proton', 'neutron', 'electron', 'subatomic', 'molecule'] },
            'ph': { name: 'pH Scale', folder: 'ph-scale', keywords: ['ph', 'acid', 'base', 'alkaline', 'liquid', 'lemon', 'soap'] },
            'forces': { name: 'Forces & Motion', folder: 'forces-and-motion-basics', keywords: ['force', 'motion', 'push', 'pull', 'friction', 'speed', 'acceleration'] },
            'gravity': { name: 'Gravity Lab', folder: 'gravity-force-lab', keywords: ['gravity', 'mass', 'attract', 'distance', 'planet', 'weight'] },
            'ohms': { name: 'Ohms Law', folder: 'ohms-law', keywords: ['voltage', 'ohms', 'current', 'electricity', 'battery', 'v equals ir'] },
            'molarity': { name: 'Molarity', folder: 'molarity', keywords: ['molarity', 'solution', 'solute', 'dissolve', 'concentration'] },
            'wave': { name: 'Wave Dynamics', folder: 'wave-on-a-string', keywords: ['wave', 'oscillation', 'frequency', 'amplitude', 'vibration'] },
            'acid-base': { name: 'Acid-Base Solutions', folder: 'acid-base-solutions', keywords: ['acid base', 'reaction', 'conductivity'] },
            'area': { name: 'Area Builder', folder: 'area-builder', keywords: ['area', 'geometry', 'math', 'square', 'perimeter'] },
            'balancing-act': { name: 'Balancing Act', folder: 'balancing-act', keywords: ['balance', 'lever', 'pivot', 'torque'] },
            'balancing-chem': { name: 'Chemical Equations', folder: 'balancing-chemical-equations', keys: ['equation', 'chemical', 'balancing'] },
            'beers': { name: 'Beers Law Lab', folder: 'beers-law-lab', keywords: ['beers', 'absorbance', 'spectrometer'] },
            'vision': { name: 'Color Vision', folder: 'color-vision', keywords: ['vision', 'eye', 'light', 'color', 'rainbow'] },
            'concentration': { name: 'Concentration Lab', folder: 'concentration', keywords: ['concentrate', 'dilute', 'saturated'] },
            'energy': { name: 'Energy Skate Park', folder: 'energy-skate-park-basics', keywords: ['skate', 'energy', 'kinetic', 'potential', 'thermal'] },
            'faraday': { name: 'Faradays Law', folder: 'faradays-law', keywords: ['magnet', 'faraday', 'coil', 'induction', 'magnetic'] },
            'fractions': { name: 'Fraction Matcher', folder: 'fraction-matcher', keywords: ['fraction', 'math fraction', 'equal parts'] },
            'friction': { name: 'Friction Study', folder: 'friction', keywords: ['friction', 'heat', 'molecular friction'] },
            'graph': { name: 'Graphing Lines', folder: 'graphing-lines', keywords: ['graph', 'line', 'slope', 'y intercept'] },
            'static': { name: 'John Travoltage', folder: 'john-travoltage', keywords: ['static', 'shock', 'spark', 'electrostatic'] },
            'ph-basics': { name: 'pH Basics', folder: 'ph-scale-basics', keywords: ['ph basics', 'simple ph'] },
            'resistance': { name: 'Resistance in Wire', folder: 'resistance-in-a-wire', keywords: ['resistance', 'wire', 'resistivity'] },
            'pressure': { name: 'Under Pressure', folder: 'under-pressure', keywords: ['pressure', 'water pressure', 'fluid', 'depth'] }
        };

        // 2. SYSTEM BOOTSTRAP
        function boot() {
            const list = document.getElementById('simList');
            for (let k in SIM_DATABASE) {
                let b = document.createElement('button');
                b.className = 'nav-item';
                b.textContent = SIM_DATABASE[k].name;
                b.id = `btn-${k}`;
                b.onclick = () => launchModule(k);
                list.appendChild(b);
            }
            document.getElementById('groqKey').value = localStorage.getItem('master_groq') || '';
            document.getElementById('geminiKey').value = localStorage.getItem('master_gemini') || '';
            launchModule('atom');
        }

        function launchModule(key) {
            if(!SIM_DATABASE[key]) return;
            const viewport = document.getElementById('viewport');
            viewport.style.opacity = '0.4';
            setTimeout(() => {
                viewport.src = `./html/${SIM_DATABASE[key].folder}/latest/${SIM_DATABASE[key].folder}_en.html`;
                document.getElementById('activeSimTitle').textContent = SIM_DATABASE[key].name;
                document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
                document.getElementById(`btn-${key}`).classList.add('active');
                viewport.style.opacity = '1';
            }, 300);
        }

        // 3. REAL-TIME INTERRUPT & NEURAL ROUTING
        let isActive = false;
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.continuous = true;
        recognition.lang = 'en-US';

        function handleInterruptionSession() {
            // THE PREMIUM INTERRUPT: Stop AI immediately when mic is clicked
            if (window.speechSynthesis.speaking) {
                window.speechSynthesis.cancel();
            }

            const btn = document.getElementById('micBtn');
            const hint = document.getElementById('micHint');

            if (!isActive) {
                isActive = true;
                btn.classList.add('active');
                hint.textContent = "Listening... Interruption Ready";
                recognition.start();
            } else {
                isActive = false;
                btn.classList.remove('active');
                hint.textContent = "Processing Command...";
                recognition.stop();
            }
        }

        recognition.onresult = (e) => {
            const transcript = e.results[e.results.length - 1][0].transcript.toLowerCase();
            neuralEngine(transcript);
        };

        // 4. THE NEURAL ENGINE (ROUTING + AI)
        async function neuralEngine(input) {
            addMsg(input, 'user');

            // INSTANT VISUAL CONTROL: Navigates board before Nova even answers
            for (let k in SIM_DATABASE) {
                if (SIM_DATABASE[k].keywords.some(word => input.includes(word))) {
                    launchModule(k);
                    break;
                }
            }

            const groqK = localStorage.getItem('master_groq');
            const gemK = localStorage.getItem('master_gemini');
            let response = "API Credentials missing. Open settings.";

            try {
                if (groqK) {
                    document.getElementById('engineLabel').textContent = "PRIMARY ENGINE: GROQ v3.3-ELITE";
                    response = await fetchGroq(input, groqK);
                } else if (gemK) {
                    document.getElementById('engineLabel').textContent = "BACKUP ENGINE: GEMINI 1.5";
                    response = await fetchGemini(input, gemK);
                }
            } catch (err) { response = "Connection interupted. Check satellite link."; }

            addMsg(response, 'nova');
            narrate(response);
        }

        async function fetchGroq(text, key) {
            const r = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${key}`, "Content-Type": "application/json" },
                body: JSON.stringify({ 
                    model: "llama-3.3-70b-versatile", 
                    messages: [{ role: "system", content: "You are Nova, an elite science tutor. Give brief, professional explanations." }, { role: "user", content: text }] 
                })
            });
            const d = await r.json();
            return d.choices[0].message.content;
        }

        async function fetchGemini(text, key) {
            const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: `Explain briefly for a science simulation: ${text}` }] }] })
            });
            const d = await r.json();
            return d.candidates[0].content.parts[0].text;
        }

        // 5. UTILITIES
        function addMsg(txt, cls) {
            const stream = document.getElementById('chatStream');
            const div = document.createElement('div');
            div.className = `bubble b-${cls}`;
            div.innerHTML = txt;
            stream.appendChild(div);
            stream.scrollTop = stream.scrollHeight;
        }

        function narrate(txt) {
            const u = new SpeechSynthesisUtterance(txt);
            u.rate = 1.05;
            window.speechSynthesis.speak(u);
        }

        function toggleModal(s) { document.getElementById('apiModal').style.display = s ? 'flex' : 'none'; }
        
        function saveKeys() {
            localStorage.setItem('master_groq', document.getElementById('groqKey').value.trim());
            localStorage.setItem('master_gemini', document.getElementById('geminiKey').value.trim());
            toggleModal(false);
            addMsg("System: Infrastructure Activated. 23 Science Modules Online.", "nova");
        }

        boot();
    </script>
</body>
</html>
