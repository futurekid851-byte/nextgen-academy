<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextGen Academy | Omni-Voice Elite</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #4facfe;
            --primary-glow: rgba(79, 172, 254, 0.4);
            --secondary: #00f2fe;
            --bg-deep: #010204;
            --panel: rgba(10, 14, 22, 0.99);
            --border: rgba(255, 255, 255, 0.04);
            --mic-ready: #10b981;
            --mic-active: #ef4444;
            --sidebar-w: 170px; /* Thinner sidebars for bigger visual */
            --tutor-w: 250px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; outline: none; }
        body, html { margin: 0; padding: 0; background: var(--bg-deep); color: #fff; font-family: 'Outfit', sans-serif; height: 100vh; width: 100vw; overflow: hidden; }

        /* CINEMA-STAGE LAYOUT */
        .app-shell { display: flex; width: 100vw; height: 100vh; }

        .sidebar-l { width: var(--sidebar-w); background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 50; }
        .sidebar-r { width: var(--tutor-w); background: var(--panel); border-left: 1px solid var(--border); display: flex; flex-direction: column; z-index: 50; }
        .main-stage { flex: 1; display: flex; flex-direction: column; background: #000; position: relative; }

        /* BRANDING */
        .brand { padding: 20px 10px; text-align: center; border-bottom: 1px solid var(--border); }
        .brand h1 { margin: 0; font-size: 0.9rem; font-weight: 900; background: linear-gradient(to right, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 2px; }

        /* SIMULATION NAV */
        .nav-list { flex: 1; overflow-y: auto; padding: 10px 5px; scrollbar-width: none; }
        .nav-item { width: 95%; margin: 0 auto 3px; padding: 10px; background: transparent; border: none; color: #475569; text-align: left; cursor: pointer; border-radius: 5px; font-size: 0.7rem; transition: var(--transition); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .nav-item:hover { color: #fff; background: rgba(255,255,255,0.02); }
        .nav-item.active { color: var(--primary); background: rgba(79, 172, 254, 0.05); border-left: 2px solid var(--primary); font-weight: bold; }

        /* VISUAL BOARD */
        .stage-header { height: 45px; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.6); border-bottom: 1px solid var(--border); }
        .board-wrap { flex: 1; position: relative; }
        iframe { width: 100%; height: 100%; border: none; background: #fff; transition: opacity 0.4s ease; }

        /* CHAT & VOICE INTERRUPT */
        .chat-stream { flex: 1; overflow-y: auto; padding: 15px; font-size: 0.75rem; scrollbar-width: none; }
        .bubble { margin-bottom: 12px; padding: 10px; border-radius: 10px; line-height: 1.5; animation: pop 0.3s ease; }
        .b-nova { background: rgba(255,255,255,0.02); border-left: 2px solid var(--primary); }
        .b-user { background: var(--primary); color: #000; font-weight: 600; align-self: flex-end; text-align: right; margin-left: 20px; }
        @keyframes pop { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        /* VOICE BUTTON */
        .voice-hub { padding: 20px; border-top: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .mic-btn { width: 55px; height: 55px; border-radius: 50%; border: none; cursor: pointer; background: var(--mic-ready); display: flex; align-items: center; justify-content: center; transition: var(--transition); box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
        .mic-btn.active { background: var(--mic-active); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.5); } 70% { box-shadow: 0 0 0 12px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }

        /* CONFIG MODAL */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(15px); }
        .modal-card { width: 380px; background: #0a0c10; padding: 25px; border-radius: 15px; border: 1px solid var(--primary); }
        input { width: 100%; background: #020406; border: 1px solid #1e293b; color: #fff; padding: 12px; border-radius: 8px; margin: 10px 0 20px; font-family: 'JetBrains Mono'; font-size: 0.8rem; }
        .btn-save { width: 100%; padding: 12px; background: var(--primary); border: none; border-radius: 8px; color: #000; font-weight: 800; cursor: pointer; }
    </style>
</head>
<body>

    <div class="app-shell">
        <aside class="sidebar-l">
            <div class="brand"><h1>NEXTGEN</h1></div>
            <nav class="nav-list" id="simMenu"></nav>
            <div style="padding:10px; text-align:center;"><button onclick="toggleModal(true)" style="background:none; border:none; color:#2d3748; font-size:0.55rem; font-weight:bold; cursor:pointer;">API CONFIG ⚙️</button></div>
        </aside>

        <main class="main-stage">
            <header class="stage-header">
                <div id="activeTitle" style="font-weight:700; font-size:0.75rem; letter-spacing:1px; text-transform:uppercase; color:var(--primary);">System Ready</div>
                <div style="font-size:0.6rem; color:#475569; font-weight:900;">REALTIME VOICE CONTROL v11.0</div>
            </header>
            <div class="board-wrap">
                <iframe id="mainBoard" src="./html/build-an-atom/latest/build-an-atom_en.html"></iframe>
            </div>
        </main>

        <aside class="sidebar-r">
            <div style="padding: 15px; border-bottom: 1px solid var(--border); font-weight: 900; font-size: 0.7rem; color: var(--primary); letter-spacing:1px;">NOVA AI TUTOR</div>
            <div class="chat-stream" id="chatDisplay">
                <div class="bubble b-nova">Welcome Anisul. I have synchronized 23 simulations. Click the <b>Green Mic</b> to speak. I will instantly switch the board to match your topic. You can interrupt me anytime.</div>
            </div>
            <div class="voice-hub">
                <span id="micStatus" style="font-size:0.55rem; font-weight:bold; color:#475569; text-transform:uppercase;">Green: Ready</span>
                <button class="mic-btn" id="micTrigger" onclick="handleVoiceSession()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="white">
                        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                    </svg>
                </button>
            </div>
        </aside>
    </div>

    <div class="modal" id="apiModal">
        <div class="modal-card">
            <h3 style="margin:0 0 15px; font-size:1rem;">API Infrastructure</h3>
            <label style="font-size:0.65rem; color:var(--primary); font-weight:bold;">GROQ API (PRIMARY)</label>
            <input type="password" id="groqInput" placeholder="Enter Groq Key...">
            <label style="font-size:0.65rem; color:var(--primary); font-weight:bold;">GEMINI API (SECONDARY)</label>
            <input type="password" id="geminiInput" placeholder="Enter Gemini Key...">
            <button class="btn-save" onclick="saveKeys()">CONNECT SATELLITES</button>
        </div>
    </div>

    <script>
        // 1. COMPREHENSIVE SIMULATION DATABASE (23 MODULES)
        const DB = {
            'atom': { name: 'Build an Atom', folder: 'build-an-atom', keys: ['atom', 'proton', 'neutron', 'electron', 'molecule'] },
            'ph': { name: 'pH Scale', folder: 'ph-scale', keys: ['ph', 'acid', 'base', 'alkaline', 'liquid', 'lemon'] },
            'forces': { name: 'Forces & Motion', folder: 'forces-and-motion-basics', keys: ['force', 'motion', 'friction', 'push', 'pull', 'speed'] },
            'gravity': { name: 'Gravity Lab', folder: 'gravity-force-lab', keys: ['gravity', 'mass', 'attract', 'distance', 'planet'] },
            'ohms': { name: 'Ohms Law', folder: 'ohms-law', keys: ['voltage', 'ohms', 'current', 'electricity', 'wire'] },
            'molarity': { name: 'Molarity', folder: 'molarity', keys: ['molarity', 'solution', 'solute', 'dissolve'] },
            'wave': { name: 'Wave Dynamics', folder: 'wave-on-a-string', keys: ['wave', 'oscillation', 'vibration', 'amplitude'] },
            'acid-base': { name: 'Acid-Base Solutions', folder: 'acid-base-solutions', keys: ['reaction', 'acid base'] },
            'area': { name: 'Area Builder', folder: 'area-builder', keys: ['area', 'geometry', 'math', 'square'] },
            'balancing-act': { name: 'Balancing Act', folder: 'balancing-act', keys: ['balance', 'lever', 'weight'] },
            'balancing-chem': { name: 'Chemical Equations', folder: 'balancing-chemical-equations', keys: ['equation', 'chemical', 'reaction'] },
            'beers': { name: 'Beers Law Lab', folder: 'beers-law-lab', keys: ['beers', 'absorbance', 'concentration'] },
            'vision': { name: 'Color Vision', folder: 'color-vision', keys: ['eye', 'light', 'color', 'vision'] },
            'concentration': { name: 'Concentration', folder: 'concentration', keys: ['concentrate', 'dilute'] },
            'energy': { name: 'Energy Skate Park', folder: 'energy-skate-park-basics', keys: ['skate', 'energy', 'kinetic', 'potential'] },
            'faraday': { name: 'Faradays Law', folder: 'faradays-law', keys: ['magnet', 'faraday', 'magnetic'] },
            'fractions': { name: 'Fraction Matcher', folder: 'fraction-matcher', keys: ['fraction', 'half', 'quarter'] },
            'friction': { name: 'Friction', folder: 'friction', keys: ['friction', 'heat', 'rubbing'] },
            'graph': { name: 'Graphing Lines', folder: 'graphing-lines', keys: ['graph', 'line', 'slope', 'intercept'] },
            'static': { name: 'John Travoltage', folder: 'john-travoltage', keys: ['static', 'shock', 'carpet', 'spark'] },
            'ph-basics': { name: 'pH Basics', folder: 'ph-scale-basics', keys: ['ph basic'] },
            'resistance': { name: 'Resistance in Wire', folder: 'resistance-in-a-wire', keys: ['resistance', 'resistivity'] },
            'pressure': { name: 'Under Pressure', folder: 'under-pressure', keys: ['pressure', 'water', 'depth', 'atmosphere'] }
        };

        // 2. SYSTEM BOOT
        function boot() {
            const menu = document.getElementById('simMenu');
            for (let k in DB) {
                let btn = document.createElement('button');
                btn.className = 'nav-item';
                btn.textContent = DB[k].name;
                btn.id = `btn-${k}`;
                btn.onclick = () => runSim(k);
                menu.appendChild(btn);
            }
            document.getElementById('groqInput').value = localStorage.getItem('nx_groq_v11') || '';
            document.getElementById('geminiInput').value = localStorage.getItem('nx_gem_v11') || '';
            runSim('atom');
        }

        function runSim(key) {
            if(!DB[key]) return;
            const frame = document.getElementById('mainBoard');
            frame.style.opacity = '0.4';
            setTimeout(() => {
                frame.src = `./html/${DB[key].folder}/latest/${DB[key].folder}_en.html`;
                document.getElementById('activeTitle').textContent = DB[key].name;
                document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
                document.getElementById(`btn-${key}`).classList.add('active');
                frame.style.opacity = '1';
            }, 250);
        }

        // 3. REALTIME INTERRUPT & VOICE ENGINE
        let listening = false;
        const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRec();
        recognition.continuous = true;
        recognition.lang = 'en-US';

        function handleVoiceSession() {
            // Interruption Logic: Cancel Nova mid-speech
            if (window.speechSynthesis.speaking) {
                window.speechSynthesis.cancel();
            }

            const btn = document.getElementById('micTrigger');
            const status = document.getElementById('micStatus');

            if (!listening) {
                listening = true;
                btn.classList.add('active');
                status.textContent = "Listening...";
                recognition.start();
            } else {
                listening = false;
                btn.classList.remove('active');
                status.textContent = "Processing...";
                recognition.stop();
            }
        }

        recognition.onresult = (e) => {
            const text = e.results[e.results.length - 1][0].transcript.toLowerCase();
            processDirectAction(text);
        };

        // 4. NEURAL ROUTING (REALTIME ACTION)
        async function processDirectAction(input) {
            addChat(input, "user");

            // INSTANT NAVIGATION (Before AI Responds)
            let routeFound = false;
            for (let k in DB) {
                if (DB[k].keys.some(word => input.includes(word))) {
                    runSim(k);
                    routeFound = true;
                    break;
                }
            }

            // AI EXPLANATION ENGINE
            const groqKey = localStorage.getItem('nx_groq_v11');
            const gemKey = localStorage.getItem('nx_gem_v11');
            let response = "API Keys disconnected. Please add them in Config.";

            try {
                if (groqKey) {
                    response = await fetchGroq(input, groqKey);
                } else if (gemKey) {
                    response = await fetchGemini(input, gemKey);
                }
            } catch (err) { response = "Network glitch. Re-attempting connection..."; }

            addChat(response, "nova");
            speak(response);
        }

        async function fetchGroq(t, k) {
            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${k}`, "Content-Type": "application/json" },
                body: JSON.stringify({ model: "llama-3.3-70b-versatile", messages: [{ role: "system", content: "You are Nova, an AI tutor. Answer scientifically and briefly." }, { role: "user", content: t }] })
            });
            const data = await res.json();
            return data.choices[0].message.content;
        }

        async function fetchGemini(t, k) {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${k}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: `Explain briefly for a science lab: ${t}` }] }] })
            });
            const data = await res.json();
            return data.candidates[0].content.parts[0].text;
        }

        // 5. UTILS
        function addChat(t, c) {
            const display = document.getElementById('chatDisplay');
            const div = document.createElement('div');
            div.className = `bubble b-${c}`;
            div.innerHTML = t;
            display.appendChild(div);
            display.scrollTop = display.scrollHeight;
        }

        function speak(t) {
            const utterance = new SpeechSynthesisUtterance(t);
            utterance.rate = 1.1;
            window.speechSynthesis.speak(utterance);
        }

        function toggleModal(s) { document.getElementById('apiModal').style.display = s ? 'flex' : 'none'; }
        function saveKeys() {
            localStorage.setItem('nx_groq_v11', document.getElementById('groqInput').value.trim());
            localStorage.setItem('nx_gem_v11', document.getElementById('geminiInput').value.trim());
            toggleModal(false);
            addChat("Infrastructure Active. 23 Modules Ready for Command.", "nova");
        }

        window.onload = boot;
    </script>
</body>
</html>
