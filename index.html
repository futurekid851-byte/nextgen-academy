<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextGen Academy | Ultimate Controller</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #4facfe;
            --primary-glow: rgba(79, 172, 254, 0.5);
            --secondary: #00f2fe;
            --bg: #010205;
            --panel: rgba(10, 14, 22, 0.99);
            --border: rgba(255, 255, 255, 0.05);
            --mic-ready: #10b981;
            --mic-active: #ef4444;
            --sidebar-w: 190px;
            --tutor-w: 280px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; outline: none; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: #fff; font-family: 'Outfit', sans-serif; height: 100vh; width: 100vw; overflow: hidden; }

        .app-shell { display: flex; width: 100vw; height: 100vh; }

        /* CINEMA-STAGE LAYOUT */
        .sidebar-l { width: var(--sidebar-w); background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 50; }
        .sidebar-r { width: var(--tutor-w); background: var(--panel); border-left: 1px solid var(--border); display: flex; flex-direction: column; z-index: 50; }
        .main-stage { flex: 1; display: flex; flex-direction: column; background: #000; position: relative; }

        .brand { padding: 25px 15px; text-align: center; border-bottom: 1px solid var(--border); }
        .brand h1 { margin: 0; font-size: 1rem; font-weight: 900; background: linear-gradient(to right, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 2px; text-transform: uppercase; }

        /* EXHAUSTIVE SIMULATION LIST */
        .sim-nav { flex: 1; overflow-y: auto; padding: 10px; scrollbar-width: none; }
        .nav-group-label { font-size: 0.6rem; font-weight: 800; color: #444; text-transform: uppercase; letter-spacing: 1.5px; margin: 15px 0 8px 10px; }
        .nav-item { width: 100%; padding: 10px 12px; margin-bottom: 3px; background: transparent; border: none; color: #555; text-align: left; cursor: pointer; border-radius: 6px; font-size: 0.75rem; transition: var(--transition); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .nav-item:hover { color: #fff; background: rgba(255,255,255,0.03); }
        .nav-item.active { color: var(--primary); background: rgba(79, 172, 254, 0.08); border-left: 3px solid var(--primary); font-weight: bold; }

        /* THE VISUAL STAGE */
        .board-header { height: 50px; padding: 0 25px; display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.5); border-bottom: 1px solid var(--border); }
        .visual-container { flex: 1; position: relative; }
        iframe { width: 100%; height: 100%; border: none; background: #fff; transition: opacity 0.4s; }

        /* TUTOR INTERFACE */
        .chat-display { flex: 1; overflow-y: auto; padding: 15px; font-size: 0.85rem; scrollbar-width: none; display: flex; flex-direction: column; gap: 15px; }
        .bubble { padding: 12px; border-radius: 12px; line-height: 1.5; animation: slideIn 0.3s ease; max-width: 95%; }
        .b-nova { background: rgba(255, 255, 255, 0.02); border-left: 2px solid var(--primary); color: #e2e8f0; }
        .b-user { background: var(--primary); color: #000; font-weight: 600; align-self: flex-end; text-align: right; box-shadow: 0 5px 15px var(--primary-glow); }

        .director-badge { font-family: 'JetBrains Mono'; font-size: 0.6rem; color: var(--secondary); background: rgba(0,0,0,0.3); padding: 4px 8px; border-radius: 4px; border: 1px solid rgba(0, 242, 254, 0.2); margin-top: 5px; display: inline-block; }

        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* VOICE COMMAND HUB */
        .voice-hub { padding: 25px; border-top: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; gap: 12px; }
        .mic-btn { width: 65px; height: 65px; border-radius: 50%; border: none; cursor: pointer; background: var(--mic-ready); display: flex; align-items: center; justify-content: center; transition: var(--transition); box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
        .mic-btn.active { background: var(--mic-active); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.6); } 70% { box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }

        /* SETTINGS MODAL */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.97); z-index: 1000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(20px); }
        .modal-card { width: 400px; background: #080a0f; padding: 35px; border-radius: 20px; border: 1px solid var(--primary); }
        input { width: 100%; background: #010204; border: 1px solid #1e293b; color: #fff; padding: 14px; border-radius: 10px; margin: 10px 0 20px; font-family: 'JetBrains Mono'; font-size: 0.8rem; }
        .btn-save { width: 100%; padding: 15px; background: var(--primary); border: none; border-radius: 12px; color: #000; font-weight: 900; cursor: pointer; }
    </style>
</head>
<body>

    <div class="app-shell">
        <aside class="sidebar-l">
            <div class="brand"><h1>ACADEMY</h1></div>
            <nav class="sim-nav" id="simMenu">
                </nav>
            <div style="padding:15px; text-align:center;"><button onclick="toggleModal(true)" style="background:none; border:none; color:#2d3748; font-size:0.6rem; font-weight:bold; cursor:pointer; letter-spacing:1px;">API CONFIG ⚙️</button></div>
        </aside>

        <main class="main-stage">
            <header class="board-header">
                <div id="activeTitle" style="font-weight:800; font-size:0.9rem; letter-spacing:1px; text-transform:uppercase; color:var(--primary);">Initializing...</div>
                <div style="font-size:0.6rem; color:#475569; font-weight:900;">ULTIMATE CONTROLLER v15.0</div>
            </header>
            <div class="visual-container">
                <iframe id="mainBoard" src="./html/build-an-atom/latest/build-an-atom_en.html"></iframe>
            </div>
        </main>

        <aside class="sidebar-r">
            <div style="padding: 15px; border-bottom: 1px solid var(--border); font-weight: 900; font-size: 0.75rem; color: var(--primary);">NOVA CONTROLLER</div>
            <div class="chat-display" id="chatStream">
                <div class="bubble b-nova">Welcome Anisul. I have full control over the 25+ simulation modules. I can "click" into specific lab screens based on your voice commands. Use the <b>Green Mic</b> to begin.</div>
            </div>
            <div class="voice-hub">
                <span id="micHint" style="font-size:0.6rem; font-weight:bold; color:#475569; text-transform:uppercase;">Green: Start Lecture</span>
                <button class="mic-btn" id="micBtn" onclick="handleInterruption()">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="white">
                        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                    </svg>
                </button>
            </div>
        </aside>
    </div>

    <div class="modal" id="configModal">
        <div class="modal-card">
            <h2 style="margin:0 0 10px; font-size:1.2rem; color:white;">System Infrastructure</h2>
            <input type="password" id="groqIn" placeholder="Groq API Key (Primary)">
            <input type="password" id="geminiIn" placeholder="Gemini API Key (Secondary)">
            <button class="btn-save" onclick="saveKeys()">ACTIVATE ACADEMY</button>
        </div>
    </div>

    <script>
        // 1. THE RESTORED & EXPANDED SIMULATION DATABASE (ALL 25+ MODULES)
        const SIM_DATABASE = {
            'Chemistry': {
                'atom': { name: 'Build an Atom', folder: 'build-an-atom', keys: ['atom', 'proton', 'electron'], screens: { base: 1, symbol: 2, game: 3 } },
                'ph': { name: 'pH Scale', folder: 'ph-scale', keys: ['ph scale', 'acid', 'base', 'alkaline'], screens: { macro: 1, micro: 2, custom: 3 } },
                'molarity': { name: 'Molarity Lab', folder: 'molarity', keys: ['molarity', 'solution', 'dissolve'] },
                'acid-base': { name: 'Acid-Base Solutions', folder: 'acid-base-solutions', keys: ['chemical reaction'] },
                'balancing-chem': { name: 'Chemical Equations', folder: 'balancing-chemical-equations', keys: ['equation', 'balance chemical'] },
                'beers': { name: 'Beers Law Lab', folder: 'beers-law-lab', keys: ['beers', 'light absorbance'] },
                'concentration': { name: 'Concentration', folder: 'concentration', keys: ['concentrate', 'dilute'] },
                'gas': { name: 'Gas Properties', folder: 'gas-properties', keys: ['gas', 'pressure', 'temperature'] }
            },
            'Physics': {
                'forces': { name: 'Forces & Motion', folder: 'forces-and-motion-basics', keys: ['force', 'motion', 'friction'], screens: { net: 1, motion: 2, friction: 3, acceleration: 4 } },
                'gravity': { name: 'Gravity Force Lab', folder: 'gravity-force-lab', keys: ['gravity', 'mass', 'attract'] },
                'energy': { name: 'Energy Skate Park', folder: 'energy-skate-park-basics', keys: ['skate', 'kinetic energy'], screens: { intro: 1, friction: 2, track: 3 } },
                'wave': { name: 'Wave on a String', folder: 'wave-on-a-string', keys: ['wave', 'oscillation', 'amplitude'] },
                'faraday': { name: 'Faradays Law', folder: 'faradays-law', keys: ['magnet', 'faraday', 'induction'] },
                'ohms': { name: 'Ohms Law', folder: 'ohms-law', keys: ['voltage', 'ohms', 'current'] },
                'resistance': { name: 'Resistance in Wire', folder: 'resistance-in-a-wire', keys: ['resistance', 'wire resistivity'] },
                'static': { name: 'John Travoltage', folder: 'john-travoltage', keys: ['static electricity', 'shock', 'spark'] },
                'pressure': { name: 'Under Pressure', folder: 'under-pressure', keys: ['water pressure', 'depth'] },
                'friction-lab': { name: 'Friction', folder: 'friction', keys: ['friction heat'] }
            },
            'Biology & Math': {
                'vision': { name: 'Color Vision', folder: 'color-vision', keys: ['vision', 'eye', 'rainbow'] },
                'area': { name: 'Area Builder', folder: 'area-builder', keys: ['area builder', 'geometry'] },
                'fractions': { name: 'Fraction Matcher', folder: 'fraction matcher', keys: ['fraction', 'math fraction'] },
                'balancing-act': { name: 'Balancing Act', folder: 'balancing-act', keys: ['lever', 'balance weight'] },
                'graphing': { name: 'Graphing Lines', folder: 'graphing lines', keys: ['slope', 'y intercept'] }
            }
        };

        let activeSimKey = 'atom';

        // 2. SYSTEM INITIALIZATION
        function boot() {
            const menu = document.getElementById('simMenu');
            for (let group in SIM_DATABASE) {
                let label = document.createElement('div');
                label.className = 'nav-group-label';
                label.textContent = group;
                menu.appendChild(label);

                for (let k in SIM_DATABASE[group]) {
                    let btn = document.createElement('button');
                    btn.className = 'nav-item';
                    btn.textContent = SIM_DATABASE[group][k].name;
                    btn.id = `btn-${k}`;
                    btn.onclick = () => controllerLaunch(k);
                    menu.appendChild(btn);
                }
            }
            document.getElementById('groqIn').value = localStorage.getItem('nx_v15_groq') || '';
            document.getElementById('geminiIn').value = localStorage.getItem('nx_v15_gem') || '';
            controllerLaunch('atom');
        }

        // 3. THE "ULTIMATE CONTROLLER" NAVIGATOR
        function controllerLaunch(key, screenNum = 1) {
            let foundSim = null;
            for (let group in SIM_DATABASE) {
                if (SIM_DATABASE[group][key]) foundSim = SIM_DATABASE[group][key];
            }
            if (!foundSim) return;

            activeSimKey = key;
            const board = document.getElementById('mainBoard');
            const url = `./html/${foundSim.folder}/latest/${foundSim.folder}_en.html?screens=${screenNum}`;
            
            board.style.opacity = '0.3';
            setTimeout(() => {
                board.src = url;
                document.getElementById('activeTitle').textContent = `${foundSim.name} Mode: ${screenNum}`;
                document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
                const targetBtn = document.getElementById(`btn-${key}`);
                if (targetBtn) targetBtn.classList.add('active');
                board.style.opacity = '1';
            }, 300);
        }

        // 4. REAL-TIME INTERRUPT & VOICE ENGINE
        let listening = false;
        const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRec();
        recognition.continuous = true;
        recognition.lang = 'en-US';

        function handleInterruption() {
            // THE PREMIUM INTERRUPT: Instantly cancel Nova's current speech
            if (window.speechSynthesis.speaking) {
                window.speechSynthesis.cancel();
            }

            const btn = document.getElementById('micBtn');
            const hint = document.getElementById('micHint');

            if (!listening) {
                listening = true;
                btn.classList.add('active');
                hint.textContent = "Nova is Listening...";
                recognition.start();
            } else {
                listening = false;
                btn.classList.remove('active');
                hint.textContent = "Nova is Thinking...";
                recognition.stop();
            }
        }

        recognition.onresult = (e) => {
            const transcript = e.results[e.results.length - 1][0].transcript.toLowerCase();
            neuralControl(transcript);
        };

        // 5. THE NEURAL CONTROL ENGINE (AUTO-ACTION)
        async function neuralControl(input) {
            addChat(input, 'user');

            // INSTANT "CLICK" ROUTING: Change sim before AI answers
            for (let group in SIM_DATABASE) {
                for (let k in SIM_DATABASE[group]) {
                    if (SIM_DATABASE[group][k].keys.some(word => input.includes(word))) {
                        controllerLaunch(k);
                        break;
                    }
                }
            }

            const groqK = localStorage.getItem('nx_v15_groq');
            const gemK = localStorage.getItem('nx_v15_gem');
            let response = "API Configuration required. Open settings.";

            try {
                if (groqK) {
                    response = await fetchGroqControl(input, groqK);
                } else if (gemK) {
                    response = await fetchGeminiControl(input, gemK);
                }
            } catch (err) { response = "Network link failed. Please retry."; }

            // PROCESS NOVA'S "CLICK" COMMANDS
            const screenMatch = response.match(/\[CLICK:screen_(\d+)\]/i);
            if (screenMatch) {
                controllerLaunch(activeSimKey, screenMatch[1]);
            }

            addChat(response, 'nova');
            speak(response);
        }

        async function fetchGroqControl(t, k) {
            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${k}`, "Content-Type": "application/json" },
                body: JSON.stringify({ 
                    model: "llama-3.3-70b-versatile", 
                    messages: [
                        { role: "system", content: "You are Nova, an AI Controller. When explaining, you can 'click' simulation screens by including [CLICK:screen_X] where X is 1, 2, or 3. Use 1 for Intro, 2 for Symbol/Lab, 3 for Game. Be brief." }, 
                        { role: "user", content: t }
                    ] 
                })
            });
            const data = await res.json();
            return data.choices[0].message.content;
        }

        async function fetchGeminiControl(t, k) {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${k}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: `Explain briefly and include [CLICK:screen_2] tags to switch visuals: ${t}` }] }] })
            });
            const data = await res.json();
            return data.candidates[0].content.parts[0].text;
        }

        // 6. UTILITIES
        function addChat(t, c) {
            const stream = document.getElementById('chatStream');
            const div = document.createElement('div');
            div.className = `bubble b-${c}`;
            
            // Clean the "Click" tags from the visual text
            const cleanT = t.replace(/\[CLICK:screen_\d+\]/gi, '<span class="director-badge">NOVA: Visual Synced</span>');
            div.innerHTML = cleanT;
            
            stream.appendChild(div);
            stream.scrollTop = stream.scrollHeight;
        }

        function speak(t) {
            const cleanT = t.replace(/\[CLICK:screen_\d+\]/gi, '');
            const utterance = new SpeechSynthesisUtterance(cleanT);
            utterance.rate = 1.1;
            window.speechSynthesis.speak(utterance);
        }

        function toggleModal(s) { document.getElementById('configModal').style.display = s ? 'flex' : 'none'; }
        
        function saveKeys() {
            localStorage.setItem('nx_v15_groq', document.getElementById('groqIn').value.trim());
            localStorage.setItem('nx_v15_gem', document.getElementById('geminiIn').value.trim());
            toggleModal(false);
            addChat("Control Systems Synchronized. I have total command of the science modules.", "nova");
        }

        window.onload = boot;
    </script>
</body>
</html>
