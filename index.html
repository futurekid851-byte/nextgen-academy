<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextGen Academy | Elite Smartboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4facfe;
            --secondary: #00f2fe;
            --bg: #020408;
            --panel: rgba(10, 14, 20, 0.98);
            --border: rgba(255, 255, 255, 0.05);
            --mic-ready: #10b981; /* Green */
            --mic-active: #ef4444; /* Red */
        }

        body, html { margin: 0; padding: 0; background: var(--bg); color: #fff; font-family: 'Outfit', sans-serif; height: 100vh; overflow: hidden; }
        
        /* 1. CINEMA LAYOUT: ULTRA-SLIM SIDEBARS */
        .app-shell { display: flex; width: 100vw; height: 100vh; }

        .sidebar-left { width: 180px; background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 10; }
        .sidebar-right { width: 260px; background: var(--panel); border-left: 1px solid var(--border); display: flex; flex-direction: column; z-index: 10; }
        .main-stage { flex: 1; display: flex; flex-direction: column; background: #000; position: relative; }

        /* HEADER */
        .top-nav { height: 50px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 15px; background: rgba(0,0,0,0.6); }
        .brand { font-weight: 800; font-size: 0.9rem; letter-spacing: 1px; color: var(--primary); }

        /* BOARD AREA (MAXIMIZED) */
        .iframe-container { flex: 1; margin: 0; background: #000; }
        iframe { width: 100%; height: 100%; border: none; background: #fff; }

        /* API CONFIG OVERLAY */
        #api-config { position: absolute; top: 60px; right: 20px; background: #161b22; padding: 15px; border-radius: 10px; border: 1px solid var(--primary); z-index: 1000; display: none; }
        input[type="password"] { width: 100%; background: #0d1117; border: 1px solid #30363d; color: white; padding: 8px; border-radius: 5px; margin: 5px 0 10px; font-size: 0.75rem; }
        
        /* THE ULTIMATE MIC BUTTON */
        .voice-section { padding: 20px; border-top: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; }
        .mic-btn { 
            width: 60px; height: 60px; border-radius: 50%; border: none; cursor: pointer; 
            transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; 
            background: var(--mic-ready); box-shadow: 0 0 20px rgba(16, 185, 129, 0.3);
        }
        .mic-btn.recording { background: var(--mic-active); animation: pulse 1.2s infinite; box-shadow: 0 0 30px rgba(239, 68, 68, 0.5); }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        /* NAVIGATION */
        .nav-item { width: 100%; padding: 12px 15px; background: transparent; border: none; color: #64748b; text-align: left; cursor: pointer; font-size: 0.75rem; transition: 0.2s; border-bottom: 1px solid rgba(255,255,255,0.02); }
        .nav-item:hover { color: #fff; background: rgba(255,255,255,0.03); }
        .nav-item.active { color: var(--primary); border-left: 3px solid var(--primary); background: rgba(79, 172, 254, 0.05); }

        /* CHAT DISPLAY */
        .chat-stream { flex: 1; overflow-y: auto; padding: 15px; font-size: 0.8rem; scrollbar-width: none; }
        .bubble { margin-bottom: 15px; padding: 12px; border-radius: 10px; line-height: 1.6; }
        .nova { background: rgba(79, 172, 254, 0.08); border-left: 2px solid var(--primary); color: #e2e8f0; }
        .user { background: rgba(255,255,255,0.03); color: #94a3b8; font-style: italic; }
        
        .engine-indicator { font-size: 0.6rem; color: var(--text-dim); text-align: center; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="app-shell">
    <aside class="sidebar-left">
        <div style="padding: 15px; border-bottom: 1px solid var(--border); text-align:center;"><span class="brand">NEXTGEN</span></div>
        <div style="flex:1; overflow-y:auto;" id="sim-menu"></div>
        <button onclick="toggleApi()" style="padding:10px; background:none; border:none; color:#444; cursor:pointer; font-size:0.6rem;">ADMIN SETTINGS</button>
    </aside>

    <main class="main-stage">
        <div id="api-config">
            <h5 style="margin:0 0 10px 0;">AI Engine Keys</h5>
            <input type="password" id="groq-key" placeholder="Groq API Key (Primary)">
            <input type="password" id="gemini-key" placeholder="Gemini API Key (Secondary)">
            <button onclick="saveApi()" style="width:100%; padding:8px; background:var(--primary); border:none; border-radius:5px; font-weight:bold; cursor:pointer;">CONNECT ENGINES</button>
        </div>

        <header class="top-nav">
            <div id="sim-title" style="font-weight:600; font-size:0.8rem; letter-spacing:1px; text-transform:uppercase;">Build an Atom</div>
            <div id="engine-status" style="font-size:0.6rem; color:var(--mic-ready);">PRIMARY: GROQ v3</div>
        </header>

        <div class="iframe-container">
            <iframe id="lab-frame" src="./html/build-an-atom/latest/build-an-atom_en.html"></iframe>
        </div>
    </main>

    <aside class="sidebar-right">
        <div style="padding: 15px; border-bottom: 1px solid var(--border); font-weight:bold; font-size:0.75rem; color:var(--primary);">NOVA INTELLIGENCE</div>
        <div class="chat-stream" id="chat">
            <div class="bubble nova">Ready for instruction. Use the Mic button to navigate or ask questions. Primary engine: Groq. Fallback: Gemini.</div>
        </div>
        
        <div class="voice-section">
            <div class="engine-indicator" id="current-engine">MODE: IDLE</div>
            <button class="mic-btn" id="mic-trigger" onclick="toggleMic()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
            </button>
            <p id="mic-hint" style="font-size:0.6rem; margin-top:10px; color:#475569;">CLICK GREEN TO START</p>
        </div>
    </aside>
</div>

<script>
    // 1. DATA RECTIFICATION
    const ACADEMY_DB = {
        'atom': { name: 'Build an Atom', path: './html/build-an-atom/latest/build-an-atom_en.html', keys: ['atom', 'proton', 'neutron', 'electron'] },
        'ph': { name: 'pH Scale', path: './html/ph-scale/latest/ph-scale_en.html', keys: ['ph', 'acid', 'base', 'liquid', 'alkaline'] },
        'forces': { name: 'Forces & Motion', path: './html/forces-and-motion-basics/latest/forces-and-motion-basics_en.html', keys: ['force', 'motion', 'push', 'friction', 'accelerate'] },
        'gravity': { name: 'Gravity Lab', path: './html/gravity-force-lab/latest/gravity-force-lab_en.html', keys: ['gravity', 'mass', 'attract', 'distance'] },
        'ohms': { name: 'Ohms Law', path: './html/ohms-law/latest/ohms-law_en.html', keys: ['voltage', 'ohms', 'current', 'electricity', 'circuit'] },
        'molarity': { name: 'Molarity', path: './html/molarity/latest/molarity_en.html', keys: ['molarity', 'solution', 'solute', 'dissolve'] },
        'wave': { name: 'Wave Dynamics', path: './html/wave-on-a-string/latest/wave-on-a-string_en.html', keys: ['wave', 'oscillation', 'frequency', 'amplitude'] }
    };

    // 2. INITIALIZATION
    function boot() {
        const menu = document.getElementById('sim-menu');
        for (let k in ACADEMY_DB) {
            let b = document.createElement('button');
            b.className = 'nav-item';
            b.textContent = ACADEMY_DB[k].name;
            b.onclick = () => runSim(k);
            menu.appendChild(b);
        }
        document.getElementById('groq-key').value = localStorage.getItem('groq_v6') || '';
        document.getElementById('gemini-key').value = localStorage.getItem('gem_v6') || '';
    }

    function runSim(key) {
        if(!ACADEMY_DB[key]) return;
        document.getElementById('lab-frame').src = ACADEMY_DB[key].path;
        document.getElementById('sim-title').textContent = ACADEMY_DB[key].name;
        document.querySelectorAll('.nav-item').forEach(btn => btn.classList.toggle('active', btn.textContent === ACADEMY_DB[key].name));
    }

    function toggleApi() { const s = document.getElementById('api-config'); s.style.display = (s.style.display === 'block') ? 'none' : 'block'; }
    function saveApi() {
        localStorage.setItem('groq_v6', document.getElementById('groq-key').value);
        localStorage.setItem('gem_v6', document.getElementById('gemini-key').value);
        toggleApi();
        addChat("System: API Encryption Saved. Engines Synchronized.", "nova");
    }

    // 3. MIC ENGINE (GREEN -> RED -> PROCESS)
    let isActive = false;
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.continuous = true;
    recognition.lang = 'en-US';

    function toggleMic() {
        const btn = document.getElementById('mic-trigger');
        const hint = document.getElementById('mic-hint');
        const indicator = document.getElementById('current-engine');

        if(!isActive) {
            isActive = true;
            btn.classList.add('recording');
            hint.textContent = "RECORDING... CLICK RED TO END";
            indicator.textContent = "MODE: LISTENING";
            recognition.start();
        } else {
            isActive = false;
            btn.classList.remove('recording');
            hint.textContent = "PROCESSING...";
            indicator.textContent = "MODE: ANALYZING";
            recognition.stop();
        }
    }

    recognition.onresult = (e) => {
        const transcript = e.results[e.results.length - 1][0].transcript;
        processRequest(transcript);
    };

    // 4. DUAL-ENGINE AI LOGIC (GROQ PRIMARY, GEMINI FALLBACK)
    async function processRequest(input) {
        addChat(input, "user");
        
        // Auto-Navigation Logic (Topic detection)
        for (let k in ACADEMY_DB) {
            if (ACADEMY_DB[k].keys.some(word => input.toLowerCase().includes(word))) {
                runSim(k);
                break;
            }
        }

        const groqKey = localStorage.getItem('groq_v6');
        const gemKey = localStorage.getItem('gem_v6');
        let response = "Please configure your API keys in Admin Settings to enable AI analysis.";

        try {
            if (groqKey) {
                // PRIMARY ENGINE
                document.getElementById('engine-status').textContent = "PRIMARY: GROQ ACTIVE";
                response = await fetchGroq(input, groqKey);
            } else if (gemKey) {
                // SECONDARY ENGINE
                document.getElementById('engine-status').textContent = "BACKUP: GEMINI ACTIVE";
                response = await fetchGemini(input, gemKey);
            }
        } catch (err) {
            response = "Engine Timeout. Reconnecting to satellite...";
        }

        addChat(response, "nova");
        narrate(response);
    }

    async function fetchGroq(text, key) {
        const r = await fetch("https://api.groq.com/openai/v1/chat/completions", {
            method: "POST",
            headers: { "Authorization": `Bearer ${key}`, "Content-Type": "application/json" },
            body: JSON.stringify({ 
                model: "llama3-8b-8192", 
                messages: [{ role: "system", content: "You are Nova, an AI science tutor. Give brief, professional answers." }, { role: "user", content: text }] 
            })
        });
        const d = await r.json();
        return d.choices[0].message.content;
    }

    async function fetchGemini(text, key) {
        const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ contents: [{ parts: [{ text: `You are Nova, an expert AI tutor. Explain simply: ${text}` }] }] })
        });
        const d = await r.json();
        return d.candidates[0].content.parts[0].text;
    }

    function addChat(txt, cls) {
        const c = document.getElementById('chat');
        const d = document.createElement('div');
        d.className = `bubble ${cls}`;
        d.textContent = txt;
        c.appendChild(d);
        c.scrollTop = c.scrollHeight;
    }

    function narrate(txt) {
        const u = new SpeechSynthesisUtterance(txt);
        u.rate = 1.05;
        window.speechSynthesis.speak(u);
    }

    boot();
</script>
</body>
</html>
