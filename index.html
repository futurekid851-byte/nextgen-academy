<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextGen Academy | AI-Powered Smartboard</title>
    <style>
        /* ================================================================
        PREMIUM SMARTBOARD UI STYLING
        ================================================================
        */
        :root {
            --bg-dark: #0f111a;
            --panel-bg: #161925;
            --accent: #4facfe;
            --accent-glow: #00f2fe;
            --text-main: #e6e6e6;
            --text-dim: #94a3b8;
            --user-msg: #2d334a;
            --nova-msg: rgba(79, 172, 254, 0.1);
            --danger: #ff4b2b;
        }

        * { box-sizing: border-box; outline: none; }
        body { 
            margin: 0; padding: 0;
            background: var(--bg-dark); 
            color: var(--text-main); 
            font-family: 'Inter', 'Segoe UI', sans-serif;
            display: flex; height: 100vh; overflow: hidden;
        }

        /* NAVIGATION PANEL */
        .left-panel { 
            width: 300px; background: var(--panel-bg); 
            display: flex; flex-direction: column; 
            border-right: 1px solid #2d334a; z-index: 10;
        }

        .brand-area { padding: 25px; background: rgba(0,0,0,0.2); border-bottom: 1px solid #2d334a; }
        .brand-area h2 { 
            margin: 0; font-size: 1.4rem; 
            background: linear-gradient(to right, var(--accent), var(--accent-glow));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-weight: 800; letter-spacing: -0.5px;
        }

        .nav-content { flex: 1; overflow-y: auto; padding: 20px; }
        .section-label { 
            font-size: 0.75rem; text-transform: uppercase; color: var(--accent);
            letter-spacing: 1.5px; margin: 25px 0 10px 5px; font-weight: 700;
        }

        /* TOPIC BUTTONS */
        .t-btn {
            width: 100%; padding: 12px 14px; margin-bottom: 8px;
            background: transparent; border: 1px solid #2d334a;
            color: var(--text-main); border-radius: 10px; cursor: pointer;
            text-align: left; display: flex; align-items: center; gap: 12px;
            transition: 0.2s; font-size: 0.9rem;
        }

        .t-btn:hover { background: #1e2235; border-color: var(--accent); transform: translateX(5px); }
        .t-btn.active {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-glow) 100%);
            border-color: transparent; font-weight: 700; color: #000;
        }

        /* MAIN SMARTBOARD */
        .main-board { flex: 1; display: flex; flex-direction: column; background: var(--bg-dark); }
        .board-header { padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.3); }
        
        .back-btn {
            background: #2d334a; color: white; border: 1px solid #444; 
            padding: 8px 16px; border-radius: 8px; cursor: pointer; 
            font-weight: bold; display: flex; align-items: center; gap: 8px;
        }

        .visual-container { 
            flex: 1; margin: 20px; background: #000; 
            border-radius: 15px; overflow: hidden; border: 1px solid #2d334a;
        }
        iframe { width: 100%; height: 100%; border: none; background: white; }

        /* RIGHT TUTOR PANEL */
        .right-panel { width: 350px; background: var(--panel-bg); border-left: 1px solid #2d334a; display: flex; flex-direction: column; }
        .chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 15px; font-size: 0.9rem; line-height: 1.4; }
        .user-msg { background: var(--user-msg); align-self: flex-end; }
        .nova-msg { background: var(--nova-msg); border-left: 3px solid var(--accent); align-self: flex-start; }
        
        .input-box { padding: 15px; background: rgba(0,0,0,0.2); border-top: 1px solid #2d334a; }
        .input-wrapper { display: flex; gap: 8px; background: #0f172a; padding: 5px; border-radius: 10px; border: 1px solid #334155; }
        .input-wrapper input { flex: 1; background: transparent; border: none; color: white; padding-left: 10px; }
        .send-btn { background: var(--accent); border: none; color: white; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: bold;}
    </style>
</head>
<body>

    <div class="left-panel">
        <div class="brand-area"><h2>NEXTGEN ACADEMY</h2></div>
        
        <div class="nav-content">
            <div class="section-label">Physics & Chemistry</div>
            <button class="t-btn active" onclick="switchBoard('atom_basic', 'Build an Atom', this)">⚛️ Atomic Structure</button>
            <button class="t-btn" onclick="switchBoard('atom_symbol', 'Atomic Symbols', this)">📄 Atomic Symbols</button>
            <button class="t-btn" onclick="switchBoard('atom_game', 'Atom Challenge', this)">🎮 Atom Game</button>
            <button class="t-btn" onclick="switchBoard('force_friction', 'Friction Lab', this)">🔥 Friction & Motion</button>
            <button class="t-btn" onclick="switchBoard('gravity', 'Gravity Orbit', this)">🪐 Gravity & Orbits</button>
            <button class="t-btn" onclick="switchBoard('wave', 'Wave Lab', this)">🌊 Waves on a String</button>
            <button class="t-btn" onclick="switchBoard('circuit_lab', 'Circuit Sandbox', this)">🔋 DC Circuit Lab</button>

            <div class="section-label">Biology & Life Science</div>
            <button class="t-btn" onclick="switchBoard('natural_selection', 'Natural Selection', this)">🧬 Natural Selection</button>
            <button class="t-btn" onclick="switchBoard('gene_expression', 'Gene Expression', this)">🧪 Gene Expression</button>
            <button class="t-btn" onclick="switchBoard('neuron', 'The Neuron', this)">🧠 Neuron Simulation</button>
            <button class="t-btn" onclick="switchBoard('color_vision', 'Color Vision', this)">👁️ Color Vision</button>
        </div>
    </div>

    <div class="main-board">
        <div class="board-header">
            <div style="display: flex; align-items: center; gap: 15px;">
                <button class="back-btn" onclick="goBack()">⬅️ Back</button>
                <h1 id="active-title" style="margin:0; font-size:1.2rem;">Atomic Structure</h1>
            </div>
            <div id="sys-status" style="font-size:0.8rem; color:var(--text-dim);">Smartboard: Online</div>
        </div>
        <div class="visual-container">
            <iframe id="smart-frame" src="./html/build-an-atom/latest/build-an-atom_en.html?screens=1" allowfullscreen></iframe>
        </div>
    </div>

    <div class="right-panel">
        <div class="tutor-header" style="padding:20px; border-bottom:1px solid #2d334a;">
            <h2 style="color:white; margin:0; font-size:1rem;">NOVA AI TUTOR</h2>
        </div>
        <div class="chat-container" id="chat-box">
            <div class="msg nova-msg">Welcome to NextGen Academy. I have linked all simulations. Which lab should we explore first?</div>
        </div>
        <div class="input-box">
            <div class="input-wrapper">
                <input type="text" id="user-query" placeholder="Ask Nova..." onkeypress="if(event.key==='Enter') processQuery()">
                <button class="send-btn" onclick="processQuery()">SEND</button>
            </div>
        </div>
    </div>

    <script>
        let boardHistory = [];

        // ═════ THE COMPLETE SIMULATION DATABASE ═════
        // Note: Make sure the folder names match exactly what is in your 'html' folder!
        const ACADEMY_DB = {
            // PHYSICS & CHEMISTRY
            atom_basic: './html/build-an-atom/latest/build-an-atom_en.html?screens=1',
            atom_symbol: './html/build-an-atom/latest/build-an-atom_en.html?screens=2',
            atom_game: './html/build-an-atom/latest/build-an-atom_en.html?screens=3',
            force_friction: './html/forces-and-motion-basics/latest/forces-and-motion-basics_en.html?screens=3',
            gravity: './html/gravity-force-lab/latest/gravity-force-lab_en.html',
            wave: './html/wave-on-a-string/latest/wave-on-a-string_en.html',
            circuit_lab: './html/circuit-construction-kit-dc/latest/circuit-construction-kit-dc_en.html?screens=2',

            // BIOLOGY (Ensure these folders exist in your /html/ directory)
            natural_selection: './html/natural-selection/latest/natural-selection_en.html',
            gene_expression: './html/gene-expression-basics/latest/gene-expression-basics_en.html',
            neuron: './html/neuron/latest/neuron_en.html',
            color_vision: './html/color-vision/latest/color-vision_en.html'
        };

        function switchBoard(key, title, btn) {
            const frame = document.getElementById('smart-frame');
            const currentUrl = frame.src;
            const currentTitle = document.getElementById('active-title').textContent;

            if (currentUrl && !currentUrl.includes(ACADEMY_DB[key].replace('./', ''))) {
                boardHistory.push({ url: currentUrl, title: currentTitle });
            }

            if (btn) {
                document.querySelectorAll('.t-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            }

            document.getElementById('active-title').textContent = title;
            frame.src = ACADEMY_DB[key];
        }

        function goBack() {
            if(boardHistory.length > 0) {
                const prev = boardHistory.pop();
                document.getElementById('smart-frame').src = prev.url;
                document.getElementById('active-title').textContent = prev.title;
            }
        }

        // Nova Logic (Simplified for clarity)
        async function processQuery() {
            const input = document.getElementById('user-query');
            const query = input.value.trim().toLowerCase();
            if(!query) return;

            const box = document.getElementById('chat-box');
            box.insertAdjacentHTML('beforeend', `<div class="msg user-msg">${query}</div>`);
            input.value = '';

            // Simple Auto-Switch based on keywords
            if (query.includes("friction")) switchBoard('force_friction', 'Friction Lab');
            if (query.includes("game")) switchBoard('atom_game', 'Atom Game');
            if (query.includes("gene")) switchBoard('gene_expression', 'Gene Expression');
            if (query.includes("neuron")) switchBoard('neuron', 'The Neuron');

            box.insertAdjacentHTML('beforeend', `<div class="msg nova-msg">I've adjusted the Smartboard for you. Let's analyze the data!</div>`);
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
